<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PET Estatística — Gestão</title>
<style>
:root{
  --bg:#0b1622;--sb:#07101a;--col:#112030;--col-h:#162840;
  --card:#162840;--card-hov:#1c3050;--accent:#4f9cf9;--green:#34d399;
  --red:#f87171;--yellow:#fbbf24;--purple:#a78bfa;--orange:#fb923c;--pink:#f472b6;
  --text:#ddeeff;--muted:#5a7a99;--border:#1a3050;--border2:#224060;
  --shadow:0 8px 32px rgba(0,0,0,.55);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:0}
.login-box{background:var(--sb);border:1px solid var(--border2);border-radius:20px;padding:40px 44px;width:380px;max-width:95vw;display:flex;flex-direction:column;gap:18px}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.login-logo-icon{width:44px;height:44px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff}
.login-logo-text{display:flex;flex-direction:column}
.login-logo-text span:first-child{font-size:17px;font-weight:700}
.login-logo-text span:last-child{font-size:11px;color:var(--muted)}
.login-box h2{font-size:18px;font-weight:600}
.login-box label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.9px;display:block;margin-bottom:5px}
.login-box input{width:100%;background:var(--col);border:1px solid var(--border2);color:var(--text);padding:10px 13px;border-radius:9px;font-size:14px;font-family:inherit;outline:none}
.login-box input:focus{border-color:var(--accent)}
.login-err{color:var(--red);font-size:12px;min-height:16px}
.btn-login{background:var(--accent);border:none;color:#fff;padding:11px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;width:100%}
.btn-login:hover{opacity:.9}
.login-hint{font-size:11px;color:var(--muted);text-align:center}

/* ── LAYOUT ── */
#sb{width:252px;min-width:252px;background:var(--sb);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width .2s;z-index:10;overflow:hidden}
#sb.col{width:52px;min-width:52px}
#sb.col .lbl{display:none!important}
#sb.col .grp-arrow{display:none}
.sb-top{padding:13px 12px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-logo{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;flex-shrink:0;cursor:pointer}
.sb-title{font-weight:700;font-size:14px;white-space:nowrap;flex:1}
#sb-toggle{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;flex-shrink:0;line-height:1;padding:0 2px}
#sb-toggle:hover{color:var(--text)}
.sb-user-bar{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.sb-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.sb-user-name{font-size:12px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user-role{font-size:10px;color:var(--muted)}
#btn-logout{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:0 3px;flex-shrink:0}
#btn-logout:hover{color:var(--red)}
.sb-scroll{flex:1;overflow-y:auto;padding:6px 0}
.sb-scroll::-webkit-scrollbar{width:3px}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.grp-header{display:flex;align-items:center;gap:7px;padding:7px 10px;cursor:pointer;user-select:none;border-radius:7px;margin:0 5px}
.grp-header:hover{background:var(--col)}
.grp-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.grp-name{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.9px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.grp-arrow{font-size:12px;color:var(--muted);transition:transform .15s}
.grp-arrow.open{transform:rotate(90deg)}
.grp-boards{overflow:hidden;transition:max-height .2s}
.sb-board-item{display:flex;align-items:center;gap:8px;padding:6px 10px 6px 24px;border-radius:7px;cursor:pointer;transition:background .15s;margin:0 5px}
.sb-board-item:hover{background:var(--col)}
.sb-board-item.active{background:var(--accent)}
.sb-board-item.active .sb-board-name{color:#fff}
.sb-board-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.sb-board-name{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-bottom{padding:8px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.sb-action{background:none;border:none;color:var(--muted);padding:7px 10px;border-radius:8px;cursor:pointer;font-size:12px;text-align:left;display:flex;align-items:center;gap:7px;width:100%;transition:all .15s}
.sb-action:hover{background:var(--col);color:var(--text)}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{height:50px;background:var(--sb);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:9px;flex-shrink:0}
#board-title{font-size:16px;font-weight:700;white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis}
.tb-btn{background:var(--col);border:1px solid var(--border2);color:var(--text);padding:4px 11px;border-radius:7px;cursor:pointer;font-size:11px;transition:all .15s;white-space:nowrap}
.tb-btn:hover{border-color:var(--accent);color:var(--accent)}
.tb-btn.danger:hover{border-color:var(--red);color:var(--red)}
.tb-members{display:flex;margin-left:4px}
.tb-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:2px solid var(--sb);margin-left:-6px;cursor:default;position:relative}
.tb-av:first-child{margin-left:0}
#search{margin-left:auto;background:var(--col);border:1px solid var(--border2);color:var(--text);padding:5px 11px;border-radius:7px;font-size:12px;width:180px;outline:none}
#search:focus{border-color:var(--accent)}
#search::placeholder{color:var(--muted)}

/* ── BOARD ── */
#board{flex:1;overflow-x:auto;overflow-y:hidden;padding:14px;display:flex;gap:13px;align-items:flex-start}
#board::-webkit-scrollbar{height:6px}
#board::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
#empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;color:var(--muted)}
#empty p{font-size:14px}

/* ── COLUMN ── */
.col{width:268px;min-width:268px;background:var(--col);border-radius:12px;border:1px solid var(--border);display:flex;flex-direction:column;max-height:100%}
.col-head{padding:10px 11px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--border)}
.col-ttl{font-weight:600;font-size:13px;flex:1;outline:none;background:none;border:none;color:var(--text);cursor:default;font-family:inherit}
.col-ttl:focus{border-bottom:1px solid var(--accent);cursor:text}
.col-cnt{background:var(--border);color:var(--muted);font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;min-width:18px;text-align:center}
.col-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:0 2px;line-height:1;border-radius:4px}
.col-del:hover{color:var(--red);background:rgba(248,113,113,.1)}
.cards{flex:1;overflow-y:auto;padding:7px;display:flex;flex-direction:column;gap:6px;min-height:32px}
.cards::-webkit-scrollbar{width:3px}
.cards::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.cards.over{background:rgba(79,156,249,.07);border-radius:8px;outline:2px dashed var(--accent)}

/* ── CARD ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:10px;cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s;position:relative;user-select:none}
.card:hover{background:var(--card-hov);border-color:var(--border2);transform:translateY(-2px);box-shadow:var(--shadow)}
.card.dragging{opacity:.3;cursor:grabbing}
/* done button on hover */
.card-done-btn{position:absolute;top:50%;right:10px;transform:translateY(-50%);width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);background:var(--col);color:var(--muted);font-size:12px;cursor:pointer;display:none;align-items:center;justify-content:center;transition:all .15s;z-index:2}
.card:hover .card-done-btn{display:flex}
.card-done-btn:hover{border-color:var(--green);color:var(--green);background:rgba(52,211,153,.1)}
.card.is-done{opacity:.6}
.card.is-done .card-ttl{text-decoration:line-through;color:var(--muted)}
.card.is-done .card-done-btn{display:flex;border-color:var(--green);color:var(--green);background:rgba(52,211,153,.15)}
.card-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px}
.tag{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700}
.card-ttl{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:5px;padding-right:28px}
.card-desc-prev{font-size:11px;color:var(--muted);line-height:1.4;margin-bottom:6px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.prog-bar{height:3px;background:var(--border);border-radius:2px;margin-bottom:5px;overflow:hidden}
.prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}
.card-foot{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.cpill{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600}
.cp-check{background:#0a2818;color:var(--green)}
.cp-done{background:#0a2818;color:var(--green)}
.cp-late{background:#2a0a0a;color:var(--red)}
.cp-ok{background:#0a1f2a;color:var(--accent)}
.cp-cmt{background:#0a1a2f;color:var(--accent)}
.card-assignees{display:flex;margin-left:auto}
.card-av{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;border:1px solid var(--card);margin-left:-4px}
.card-av:first-child{margin-left:0}

/* ── ADD CARD ── */
.add-card{margin:5px 7px 7px;padding:7px 10px;background:none;border:1px dashed var(--border2);color:var(--muted);border-radius:8px;cursor:pointer;font-size:12px;transition:all .15s;display:flex;align-items:center;gap:5px}
.add-card:hover{border-color:var(--accent);color:var(--accent)}
.add-form{padding:7px;display:none;flex-direction:column;gap:5px}
.add-form.open{display:flex}
.add-form input{background:var(--card);border:1px solid var(--border2);color:var(--text);padding:7px 9px;border-radius:7px;font-size:13px;font-family:inherit;outline:none}
.add-form input:focus{border-color:var(--accent)}
.add-form-btns{display:flex;gap:5px}
.btn-ok{background:var(--accent);border:none;color:#fff;padding:6px 13px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:700}
.btn-ok:hover{opacity:.9}
.btn-no{background:none;border:1px solid var(--border2);color:var(--muted);padding:6px 11px;border-radius:7px;cursor:pointer;font-size:12px}
.btn-no:hover{color:var(--text)}
#add-col{width:268px;min-width:268px;background:rgba(255,255,255,.025);border:2px dashed var(--border2);border-radius:12px;padding:13px;cursor:pointer;color:var(--muted);font-size:12px;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;align-self:flex-start}
#add-col:hover{border-color:var(--accent);color:var(--accent);background:rgba(79,156,249,.04)}

/* ── MODAL ── */
#ov{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:flex-start;justify-content:center;z-index:100;backdrop-filter:blur(3px);padding:36px 16px;overflow-y:auto}
#ov.open{display:flex}
#modal{background:#0a1e32;border:1px solid var(--border2);border-radius:16px;width:640px;max-width:100%;flex-shrink:0}
.m-head{padding:16px 20px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px}
.m-col-badge{font-size:10px;color:var(--muted);padding:2px 9px;background:var(--border);border-radius:20px;white-space:nowrap;flex-shrink:0}
#m-title{font-size:16px;font-weight:600;background:none;border:none;color:var(--text);flex:1;outline:none;font-family:inherit;min-width:0}
#m-title:focus{border-bottom:2px solid var(--accent)}
#m-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px;line-height:1;flex-shrink:0}
#m-close:hover{color:var(--text)}
.m-body{padding:16px 20px;display:flex;gap:20px}
.m-main{flex:1;display:flex;flex-direction:column;gap:14px;min-width:0}
.m-side{width:164px;flex-shrink:0;display:flex;flex-direction:column;gap:10px}
.m-sec label{display:block;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.9px;margin-bottom:7px}
.m-sec textarea,.m-sec input[type=date]{width:100%;background:var(--col);border:1px solid var(--border2);color:var(--text);padding:8px 10px;border-radius:8px;font-size:13px;font-family:inherit;outline:none}
.m-sec textarea{resize:vertical;min-height:68px}
.m-sec textarea:focus,.m-sec input[type=date]:focus{border-color:var(--accent)}
.tags-wrap{display:flex;flex-wrap:wrap;gap:5px}
.tag-tog{padding:3px 10px;border-radius:20px;border:2px solid transparent;cursor:pointer;font-size:10px;font-weight:700;opacity:.4;transition:all .15s}
.tag-tog.on{opacity:1;border-color:rgba(255,255,255,.2)}
/* assignees */
.assign-list{display:flex;flex-direction:column;gap:4px;max-height:140px;overflow-y:auto}
.assign-row{display:flex;align-items:center;gap:7px;padding:4px 6px;border-radius:6px;cursor:pointer;transition:background .1s}
.assign-row:hover{background:var(--col-h)}
.assign-row input[type=checkbox]{accent-color:var(--accent);width:13px;height:13px;cursor:pointer;flex-shrink:0}
.assign-row span{font-size:12px}
/* side info */
.side-info{background:var(--col);border-radius:8px;padding:10px;font-size:12px;display:flex;flex-direction:column;gap:6px}
.side-info-row{display:flex;justify-content:space-between;align-items:center}
.side-info-row span:first-child{color:var(--muted);font-size:11px}
.side-info-row span:last-child{font-weight:600;font-size:11px}
/* checklist */
.cl-prog{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.cl-prog-bar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.cl-prog-fill{height:100%;background:var(--green);border-radius:3px;transition:width .3s}
.cl-prog-txt{font-size:10px;color:var(--muted);min-width:28px;text-align:right}
.cl-item{display:flex;align-items:center;gap:7px;padding:5px 7px;background:var(--col);border-radius:7px;margin-bottom:4px}
.cl-item input[type=checkbox]{accent-color:var(--green);width:13px;height:13px;cursor:pointer;flex-shrink:0}
.cl-item-text{font-size:12px;flex:1;background:none;border:none;color:var(--text);outline:none;font-family:inherit}
.cl-item-text.done{text-decoration:line-through;color:var(--muted)}
.cl-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;line-height:1}
.cl-del:hover{color:var(--red)}
.cl-add-row{display:flex;gap:5px;margin-top:6px}
.cl-add-row input{flex:1;background:var(--col);border:1px solid var(--border2);color:var(--text);padding:6px 9px;border-radius:7px;font-size:12px;font-family:inherit;outline:none}
.cl-add-row input:focus{border-color:var(--accent)}
.cl-add-row button{background:var(--accent);border:none;color:#fff;padding:6px 11px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:700}
/* comments */
.comment{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.comment:last-child{border-bottom:none}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10px;flex-shrink:0}
.cm-body{flex:1;min-width:0}
.cm-meta{display:flex;align-items:center;gap:7px;margin-bottom:3px;flex-wrap:wrap}
.cm-author{font-size:11px;font-weight:700}
.cm-time{font-size:10px;color:var(--muted)}
.cm-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;margin-left:auto;padding:0 2px}
.cm-del:hover{color:var(--red)}
.cm-text{font-size:12px;line-height:1.5;word-break:break-word}
.cm-input-wrap{display:flex;gap:7px;margin-top:8px}
.cm-input-wrap textarea{flex:1;background:var(--col);border:1px solid var(--border2);color:var(--text);padding:7px 9px;border-radius:8px;font-size:12px;font-family:inherit;outline:none;resize:none;min-height:54px}
.cm-input-wrap textarea:focus{border-color:var(--accent)}
.m-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:7px}
.btn-del-card{background:none;border:1px solid var(--red);color:var(--red);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px}
.btn-del-card:hover{background:rgba(248,113,113,.1)}

/* ── DIALOG ── */
#dlg-ov{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:300}
#dlg-ov.open{display:flex}
#dlg{background:#0a1e32;border:1px solid var(--border2);border-radius:13px;padding:22px;width:360px;max-width:95vw;display:flex;flex-direction:column;gap:12px}
#dlg h3{font-size:15px;font-weight:700}
#dlg p{font-size:13px;color:var(--muted);line-height:1.5}
#dlg input,#dlg select{width:100%;background:var(--col);border:1px solid var(--border2);color:var(--text);padding:9px 11px;border-radius:8px;font-size:13px;font-family:inherit;outline:none}
#dlg input:focus,#dlg select:focus{border-color:var(--accent)}
#dlg select option{background:var(--col)}
.dlg-btns{display:flex;gap:7px;justify-content:flex-end;margin-top:4px}
.dlg-ok{background:var(--accent);border:none;color:#fff;padding:7px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700}
.dlg-ok.danger{background:var(--red)}
.dlg-cancel{background:none;border:1px solid var(--border2);color:var(--muted);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px}

/* ── ADMIN PANEL ── */
#admin-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(3px)}
#admin-ov.open{display:flex}
#admin-panel{background:#0a1e32;border:1px solid var(--border2);border-radius:16px;width:520px;max-width:95vw;max-height:80vh;display:flex;flex-direction:column}
.admin-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.admin-head h2{font-size:16px;font-weight:700;flex:1}
#admin-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px;line-height:1}
#admin-close:hover{color:var(--text)}
.admin-body{padding:16px 20px;overflow-y:auto;flex:1}
.user-row{display:flex;align-items:center;gap:10px;padding:9px 11px;background:var(--col);border-radius:9px;margin-bottom:7px}
.user-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-info-name{font-size:13px;font-weight:600}
.user-info-role{font-size:10px;color:var(--muted)}
.user-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0 4px}
.user-del:hover{color:var(--red)}
.admin-add-form{display:flex;flex-direction:column;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.admin-add-form input{background:var(--col);border:1px solid var(--border2);color:var(--text);padding:8px 11px;border-radius:8px;font-size:13px;font-family:inherit;outline:none}
.admin-add-form input:focus{border-color:var(--accent)}
.admin-row2{display:flex;gap:7px}
.admin-row2 select{flex:1;background:var(--col);border:1px solid var(--border2);color:var(--text);padding:8px 11px;border-radius:8px;font-size:13px;font-family:inherit;outline:none}

/* TOOLTIP */
[data-tip]{position:relative}

<div id="modal">
  <div class="m-head">

  <div class="m-body">

<script type="module">
  // Importando os módulos do Firebase
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // Cole o seu firebaseConfig inteiro aqui
  const firebaseConfig = {
    apiKey: "AIzaSyBGQNhmiME4JlvWWjgRBbGsXOPfxGWJlpY",
    authDomain: "pet-estatistica.firebaseapp.com",
    projectId: "pet-estatistica",
    storageBucket: "pet-estatistica.firebasestorage.app",
    messagingSenderId: "1002350146009",
    appId: "1:1002350146009:web:30e2ee2496a3f668f2e9c8"
  };

  // Inicializando o Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
const TAGS=[
  {id:'urgente',label:'Urgente',color:'#f87171',bg:'#3a0a0a'},
  {id:'pesquisa',label:'Pesquisa',color:'#a78bfa',bg:'#1a0838'},
  {id:'evento',label:'Evento',color:'#fb923c',bg:'#2a1000'},
  {id:'monitoria',label:'Monitoria',color:'#34d399',bg:'#042818'},
  {id:'divulgacao',label:'Divulgação',color:'#4f9cf9',bg:'#041838'},
  {id:'reuniao',label:'Reunião',color:'#fbbf24',bg:'#281a00'},
  {id:'relatorio',label:'Relatório',color:'#f472b6',bg:'#280a20'},
  {id:'bloqueado',label:'Bloqueado',color:'#94a3b8',bg:'#1a2030'},
];
const AV_COLORS=['#4f9cf9','#34d399','#a78bfa','#fb923c','#f472b6','#fbbf24','#f87171','#60d8d8'];
const GRP_COLORS=['#4f9cf9','#34d399','#a78bfa','#fb923c','#f472b6','#fbbf24'];

// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
function loadS(){try{return JSON.parse(localStorage.getItem('pet_kb'))||null}catch(e){return null}}
function saveS(){localStorage.setItem('pet_kb',JSON.stringify(S))}
function uid(){return '_'+Math.random().toString(36).substr(2,9)}

// Cole o seu UID do Firebase aqui dentro das aspas!
const ADMIN_UID = "COLE_SEU_UID_AQUI_DENTRO";

function initState(){
  return {
    users: [
      {
        id: 'DSMUCTNmRPSzDildBMJ27hZyxPw2', // Agora o ID do sistema bate exatamente com o do Firebase
        name: 'Administrador', 
        username: 'admin', 
        role: 'admin', 
        color: AV_COLORS[0]
      },
    ],
    groups: [
      {id: 'g1', name: 'Pesquisa', color: '#a78bfa', open: true, boardIds: []},
      {id: 'g2', name: 'Eventos', color: '#fb923c', open: true, boardIds: []},
      {id: 'g3', name: 'Divulgação', color: '#4f9cf9', open: true, boardIds: []},
      {id: 'g4', name: 'Monitoria', color: '#34d399', open: false, boardIds: []},
    ],
    boards: [],
    active: null
  };
}

let S = initState(); // Inicia com o estado padrão vazio até o banco carregar
// Função para SALVAR no Firebase
async function saveS() {
  try {
    const docRef = doc(db, "gestao_pet", "estado_geral");
    await setDoc(docRef, S);
  } catch (e) {
    console.error("Erro ao salvar no Firebase: ", e);
  }
}

// Função para OUVIR o Firebase em tempo real
function startRealtimeSync() {
  const docRef = doc(db, "gestao_pet", "estado_geral");
  
  // O onSnapshot fica "escutando" o banco. Se alguém mudar algo, ele atualiza a tela!
  onSnapshot(docRef, (docSnap) => {
    if (docSnap.exists()) {
      S = docSnap.data();
      // Só renderiza se o usuário já estiver logado
      if (session) {
        render(); 
      }
    } else {
      // Se for a primeira vez rodando o app e o banco estiver vazio, salva o initState
      saveS();
    }
  });
}
startRealtimeSync();

// ══════════════════════════════════════════════════════
// SESSION
// ══════════════════════════════════════════════════════
let session=null; // {userId}
function login(username,pass){
  if(pass===MASTER_PASS&&username==='admin'){
    const u=S.users.find(x=>x.username==='admin');
    if(u){session={userId:u.id};return true}
  }
  const u=S.users.find(x=>x.username===username&&x.password===pass);
  if(u){session={userId:u.id};return true}
  return false;
}
function logout(){session=null;showLogin()}
function me(){return session?S.users.find(u=>u.id===session.userId):null}
function isAdmin(){const u=me();return u&&(u.role==='admin'||u.role==='tutor')}

// ══════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function uid(){return '_'+Math.random().toString(36).substr(2,9)}
function fmtDate(d){if(!d)return '';const[y,m,day]=d.split('-');return `${day}/${m}/${y}`}
function fmtTs(ts){return new Date(ts).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}
function avInitials(name){return name.split(' ').map(w=>w[0]).join('').toUpperCase().substr(0,2)}
function avColor(userId){const u=S.users.find(x=>x.id===userId);return u?u.color:AV_COLORS[0]}
function avEl(userId,size=28){
  const u=S.users.find(x=>x.id===userId);
  const name=u?u.name:'?';
  const color=u?u.color:AV_COLORS[0];
  return `<div class="av" style="width:${size}px;height:${size}px;background:${color}22;color:${color};font-size:${Math.round(size*.38)}px" data-tip="${esc(name)}">${avInitials(name)}</div>`;
}
function board(){return S.boards.find(b=>b.id===S.active)}
function col(b,id){return b.columns.find(c=>c.id===id)}
function findCard(b,cardId){for(const c of b.columns){const k=c.cards.find(x=>x.id===cardId);if(k)return{card:k,col:c}}return null}

// ══════════════════════════════════════════════════════
// DIALOG
// ══════════════════════════════════════════════════════
let dlgCb=null;
function dialog({title,msg,input,select,options,defaultVal='',okLabel='OK',danger=false},cb){
  dlgCb=cb;
  document.getElementById('dlg-h').textContent=title;
  const p=document.getElementById('dlg-p');
  const inp=document.getElementById('dlg-inp');
  const sel=document.getElementById('dlg-sel');
  p.style.display=msg?'':'none'; if(msg)p.textContent=msg;
  inp.style.display=input?'':'none';
  if(input){inp.value=defaultVal;setTimeout(()=>{inp.focus();inp.select()},80)}
  sel.style.display=select?'':'none';
  if(select&&options){sel.innerHTML=options.map(o=>`<option value="${esc(o.value)}">${esc(o.label)}</option>`).join('')}
  const ok=document.getElementById('dlg-ok');
  ok.textContent=okLabel;
  ok.className='dlg-ok'+(danger?' danger':'');
  document.getElementById('dlg-ov').classList.add('open');
}
document.getElementById('dlg-ok').onclick=()=>{
  document.getElementById('dlg-ov').classList.remove('open');
  if(dlgCb){
    const inp=document.getElementById('dlg-inp');
    const sel=document.getElementById('dlg-sel');
    if(inp.style.display!=='none') dlgCb(inp.value.trim());
    else if(sel.style.display!=='none') dlgCb(sel.value);
    else dlgCb(true);
  }
};
document.getElementById('dlg-cancel').onclick=()=>document.getElementById('dlg-ov').classList.remove('open');
document.getElementById('dlg-inp').onkeydown=e=>{if(e.key==='Enter')document.getElementById('dlg-ok').click();if(e.key==='Escape')document.getElementById('dlg-cancel').click()};

// ══════════════════════════════════════════════════════
// LOGIN SCREEN
// ══════════════════════════════════════════════════════
function showLogin(){
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-err').textContent='';
  document.getElementById('login-user').value='';
  document.getElementById('login-pass').value='';
  setTimeout(()=>document.getElementById('login-user').focus(),100);
}
function hideLogin(){document.getElementById('login-screen').style.display='none'}

document.getElementById('btn-login').onclick=doLogin;
document.getElementById('login-pass').onkeydown=e=>{if(e.key==='Enter')doLogin()};
document.getElementById('login-user').onkeydown=e=>{if(e.key==='Enter')document.getElementById('login-pass').focus()};
function doLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  const err = document.getElementById('login-err');

  err.textContent = "Conectando...";

  const email = user.includes('@') ? user : `${user}@pet.ufiscar.br`;

  signInWithEmailAndPassword(auth, email, pass)
    .then((userCredential) => {
      hideLogin();
      session = { userId: userCredential.user.uid };
      render();
    })
    .catch((error) => {
      err.textContent = "Falha no acesso. Verifique suas credenciais.";
      console.error(error);
    });
}

// ══════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════
function render(){renderSB();renderBoard()}

function renderSB(){
  const u=me(); if(!u)return;
  // user bar
  const avEl2=document.getElementById('sb-av-el');
  avEl2.style.cssText=`width:28px;height:28px;border-radius:50%;background:${u.color}22;color:${u.color};font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0`;
  avEl2.textContent=avInitials(u.name);
  document.getElementById('sb-user-name').textContent=u.name;
  document.getElementById('sb-user-role').textContent=u.role.charAt(0).toUpperCase()+u.role.slice(1);
  document.getElementById('btn-admin').style.display=isAdmin()?'':'none';

  const scroll=document.getElementById('sb-scroll');
  scroll.innerHTML='';

  // ungrouped boards
  const groupedIds=S.groups.flatMap(g=>g.boardIds||[]);
  const ungrouped=S.boards.filter(b=>!groupedIds.includes(b.id));

  // groups
  S.groups.forEach(g=>{
    const gBoards=g.boardIds.map(id=>S.boards.find(b=>b.id===id)).filter(Boolean);
    const grpEl=document.createElement('div');
    const isOpen=g.open!==false;
    grpEl.innerHTML=`
      <div class="grp-header" data-gid="${g.id}">
        <div class="grp-dot" style="background:${g.color}"></div>
        <span class="grp-name lbl">${esc(g.name)}</span>
        <span class="grp-arrow lbl ${isOpen?'open':''}">▶</span>
      </div>
      <div class="grp-boards" style="max-height:${isOpen?'600px':'0'}"></div>
    `;
    const boardsDiv=grpEl.querySelector('.grp-boards');
    gBoards.forEach(b=>boardsDiv.appendChild(sbBoardItem(b)));
    grpEl.querySelector('.grp-header').onclick=()=>{
      g.open=!g.open;saveS();renderSB();
    };
    scroll.appendChild(grpEl);
  });

  // ungrouped
  if(ungrouped.length){
    const label=document.createElement('div');
    label.className='grp-header';
    label.style.cursor='default';
    label.innerHTML=`<div class="grp-dot" style="background:var(--muted)"></div><span class="grp-name lbl">Sem grupo</span>`;
    scroll.appendChild(label);
    ungrouped.forEach(b=>scroll.appendChild(sbBoardItem(b)));
  }
}

function sbBoardItem(b){
  const el=document.createElement('div');
  el.className='sb-board-item'+(b.id===S.active?' active':'');
  el.innerHTML=`<div class="sb-board-dot" style="background:${b.color}"></div><span class="sb-board-name lbl">${esc(b.name)}</span>`;
  el.onclick=()=>{S.active=b.id;saveS();render()};
  return el;
}

function renderBoard(q=''){
  const b=board();
  const boardEl=document.getElementById('board');
  const emptyEl=document.getElementById('empty');
  const wrap=document.getElementById('board-title-wrap');
  const srch=document.getElementById('search');
  if(!b){
    boardEl.style.display='none'; emptyEl.style.display='flex';
    wrap.style.display='none'; srch.style.display='none'; return;
  }
  boardEl.style.display='flex'; emptyEl.style.display='none';
  wrap.style.display='flex'; srch.style.display='';
  document.getElementById('board-title').textContent=b.name;

  // member avatars
  const tba=document.getElementById('tb-members');
  tba.innerHTML='';
  (b.memberIds||[]).slice(0,6).forEach(uid2=>{tba.innerHTML+=avEl(uid2,26)});

  boardEl.innerHTML='';
  const lq=(q||'').toLowerCase();
  b.columns.forEach(c=>{
    const cards=lq?c.cards.filter(k=>k.title.toLowerCase().includes(lq)||(k.desc||'').toLowerCase().includes(lq)):c.cards;
    const colEl=document.createElement('div');
    colEl.className='col'; colEl.dataset.colId=c.id;
    // header
    const head=document.createElement('div'); head.className='col-head';
    const ttl=document.createElement('input'); ttl.className='col-ttl'; ttl.value=c.title; ttl.readOnly=true;
    ttl.ondblclick=()=>{ttl.readOnly=false;ttl.focus();ttl.select()};
    ttl.onblur=()=>{ttl.readOnly=true;const v=ttl.value.trim();if(v&&v!==c.title){c.title=v;saveS()}else ttl.value=c.title};
    ttl.onkeydown=e=>{if(e.key==='Enter')ttl.blur();if(e.key==='Escape'){ttl.value=c.title;ttl.blur()}};
    const cnt=document.createElement('span'); cnt.className='col-cnt'; cnt.textContent=c.cards.length;
    const del=document.createElement('button'); del.className='col-del'; del.title='Excluir coluna'; del.textContent='×';
    del.onclick=()=>dialog({title:'Excluir coluna?',msg:`"${c.title}" e todos seus cards serão removidos.`,danger:true,okLabel:'Excluir'},ok=>{if(!ok)return;const bd=board();bd.columns=bd.columns.filter(x=>x.id!==c.id);saveS();renderBoard(q)});
    head.append(ttl,cnt,del); colEl.appendChild(head);
    // cards
    const container=document.createElement('div'); container.className='cards'; container.dataset.colId=c.id;
    cards.forEach(card=>container.appendChild(buildCard(card,c.id)));
    container.addEventListener('dragover',e=>{e.preventDefault();container.classList.add('over')});
    container.addEventListener('dragleave',e=>{if(!container.contains(e.relatedTarget))container.classList.remove('over')});
    container.addEventListener('drop',e=>{
      e.preventDefault(); container.classList.remove('over');
      if(!drag.id)return;
      const bd=board(); const fc=col(bd,drag.from); const tc=col(bd,c.id);
      if(!fc||!tc)return;
      const idx=fc.cards.findIndex(x=>x.id===drag.id); if(idx===-1)return;
      const[moved]=fc.cards.splice(idx,1); tc.cards.push(moved); saveS(); renderBoard(q);
    });
    colEl.appendChild(container);
    // add form
    const form=document.createElement('div'); form.className='add-form'; form.id='form-'+c.id;
    const inp=document.createElement('input'); inp.placeholder='Título da tarefa...';
    const fbts=document.createElement('div'); fbts.className='add-form-btns';
    const fok=document.createElement('button'); fok.className='btn-ok'; fok.textContent='Adicionar';
    const fno=document.createElement('button'); fno.className='btn-no'; fno.textContent='Cancelar';
    fbts.append(fok,fno); form.append(inp,fbts);
    fok.onclick=()=>{const t=inp.value.trim();if(!t)return;col(board(),c.id).cards.push({id:uid(),title:t,desc:'',tags:[],due:'',checklist:[],comments:[],assignees:[],done:false,createdBy:session.userId,createdAt:Date.now()});saveS();renderBoard(q)};
    fno.onclick=()=>{form.classList.remove('open');inp.value=''};
    inp.onkeydown=e=>{if(e.key==='Enter')fok.click();if(e.key==='Escape')fno.click()};
    colEl.appendChild(form);
    const addBtn=document.createElement('button'); addBtn.className='add-card'; addBtn.textContent='+ Adicionar tarefa';
    addBtn.onclick=()=>{form.classList.add('open');inp.focus()};
    colEl.appendChild(addBtn);
    boardEl.appendChild(colEl);
  });
  // add col
  const addColBtn=document.createElement('button'); addColBtn.id='add-col'; addColBtn.textContent='+ Nova coluna';
  addColBtn.onclick=()=>dialog({title:'Nova coluna',input:true,defaultVal:'Nova coluna',okLabel:'Criar'},name=>{
    if(!name)return; board().columns.push({id:uid(),title:name,cards:[]}); saveS(); renderBoard();
  });
  boardEl.appendChild(addColBtn);
}

// ── drag state ──
let drag={id:null,from:null};

function buildCard(card,colId){
  const el=document.createElement('div');
  el.className='card'+(card.done?' is-done':'');
  el.dataset.id=card.id; el.draggable=true;
  el.addEventListener('dragstart',()=>{drag.id=card.id;drag.from=colId;el.classList.add('dragging')});
  el.addEventListener('dragend',()=>{el.classList.remove('dragging');drag.id=null;drag.from=null});
  el.addEventListener('click',e=>{if(!e.target.classList.contains('card-done-btn'))openModal(card.id)});

  const total=card.checklist.length;
  const done=card.checklist.filter(x=>x.done).length;
  const today=new Date().toISOString().split('T')[0];
  const late=card.due&&card.due<today&&!card.done;
  const cmts=(card.comments||[]).length;

  let html=`<button class="card-done-btn" title="${card.done?'Reabrir':'Concluir'}">${card.done?'↺':'✓'}</button>`;
  const tagsHtml=(card.tags||[]).map(tid=>{const t=TAGS.find(x=>x.id===tid);return t?`<span class="tag" style="background:${t.bg};color:${t.color}">${t.label}</span>`:''}).join('');
  if(tagsHtml) html+=`<div class="card-tags">${tagsHtml}</div>`;
  if(total>0) html+=`<div class="prog-bar"><div class="prog-fill" style="width:${Math.round(done/total*100)}%"></div></div>`;
  html+=`<div class="card-ttl">${esc(card.title)}</div>`;
  if(card.desc) html+=`<div class="card-desc-prev">${esc(card.desc)}</div>`;
  let foot='';
  if(total>0) foot+=`<span class="cpill ${done===total?'cp-done':'cp-check'}">☑ ${done}/${total}</span>`;
  if(card.due) foot+=`<span class="cpill ${late?'cp-late':'cp-ok'}">${late?'⚠':'📅'} ${fmtDate(card.due)}</span>`;
  if(cmts>0) foot+=`<span class="cpill cp-cmt">💬 ${cmts}</span>`;
  const assignHtml=(card.assignees||[]).map(uid2=>avEl(uid2,20)).join('');
  if(foot||assignHtml) html+=`<div class="card-foot">${foot}<div class="card-assignees">${assignHtml}</div></div>`;
  el.innerHTML=html;

  el.querySelector('.card-done-btn').onclick=e=>{
    e.stopPropagation();
    const b=board(); const f=findCard(b,card.id);
    if(f){f.card.done=!f.card.done;saveS();renderBoard(document.getElementById('search').value)}
  };
  return el;
}

// ══════════════════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════════════════
let mState={cardId:null};

function openModal(cardId){
  const b=board(); const found=findCard(b,cardId); if(!found)return;
  const{card,col:c}=found; mState.cardId=cardId;
  document.getElementById('m-col-lbl').textContent=c.title;
  document.getElementById('m-title').value=card.title;
  document.getElementById('m-desc').value=card.desc||'';
  document.getElementById('m-due').value=card.due||'';
  // tags
  const te=document.getElementById('m-tags'); te.innerHTML='';
  TAGS.forEach(t=>{
    const btn=document.createElement('button'); btn.className='tag-tog'+(( card.tags||[]).includes(t.id)?' on':'');
    btn.textContent=t.label; btn.style.background=t.bg; btn.style.color=t.color; btn.dataset.tid=t.id;
    btn.onclick=()=>btn.classList.toggle('on'); te.appendChild(btn);
  });
  // assignees
  const al=document.getElementById('m-assign'); al.innerHTML='';
  S.users.forEach(u=>{
    const row=document.createElement('div'); row.className='assign-row';
    const cb=document.createElement('input'); cb.type='checkbox';
    cb.checked=(card.assignees||[]).includes(u.id);
    const sp=document.createElement('span'); sp.textContent=u.name;
    row.append(cb,sp);
    row.onclick=()=>cb.checked=!cb.checked;
    cb.onclick=e=>e.stopPropagation();
    al.appendChild(row);
  });
  // info
  const info=document.getElementById('m-info');
  const creator=S.users.find(u=>u.id===card.createdBy);
  info.innerHTML=`
    <div class="side-info-row"><span>Criado por</span><span>${esc(creator?creator.name:'—')}</span></div>
    <div class="side-info-row"><span>Criado em</span><span>${card.createdAt?fmtDate(new Date(card.createdAt).toISOString().split('T')[0]):'—'}</span></div>
    <div class="side-info-row"><span>Status</span><span style="color:${card.done?'var(--green)':'var(--muted)'}">${card.done?'✓ Concluído':'Em aberto'}</span></div>
  `;
  if(!card.comments)card.comments=[];
  renderModalCL(card); renderModalCmts(card);
  document.getElementById('ov').classList.add('open');
  document.getElementById('m-title').focus();
}

function saveModal(){
  const b=board(); const f=findCard(b,mState.cardId); if(!f)return;
  const card=f.card;
  const t=document.getElementById('m-title').value.trim(); if(t)card.title=t;
  card.desc=document.getElementById('m-desc').value.trim();
  card.due=document.getElementById('m-due').value;
  card.tags=Array.from(document.querySelectorAll('.tag-tog.on')).map(el=>el.dataset.tid).filter(Boolean);
  card.assignees=Array.from(document.querySelectorAll('.assign-row input[type=checkbox]'))
    .map((cb,i)=>cb.checked?S.users[i].id:null).filter(Boolean);
  saveS(); renderBoard(document.getElementById('search').value);
}

function closeModal(){saveModal();document.getElementById('ov').classList.remove('open')}
document.getElementById('m-close').onclick=closeModal;
document.getElementById('ov').onclick=e=>{if(e.target===document.getElementById('ov'))closeModal()};

function renderModalCL(card){
  const total=card.checklist.length, done=card.checklist.filter(x=>x.done).length;
  document.getElementById('cl-summary').textContent=`${done}/${total}`;
  const prog=document.getElementById('cl-prog'); const fill=document.getElementById('cl-prog-fill'); const txt=document.getElementById('cl-prog-txt');
  if(total>0){prog.style.display='flex';const p=Math.round(done/total*100);fill.style.width=p+'%';txt.textContent=p+'%'}else prog.style.display='none';
  const cl=document.getElementById('m-cl'); cl.innerHTML='';
  card.checklist.forEach((item,i)=>{
    const row=document.createElement('div'); row.className='cl-item';
    const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=item.done;
    cb.onchange=()=>{const b=board();const f=findCard(b,mState.cardId);if(f){f.card.checklist[i].done=cb.checked;saveS();renderModalCL(f.card);renderBoardChecklist()}};
    const sp=document.createElement('input'); sp.className='cl-item-text'+(item.done?' done':''); sp.value=item.text;
    sp.onblur=()=>{const v=sp.value.trim();if(v){const b=board();const f=findCard(b,mState.cardId);if(f){f.card.checklist[i].text=v;saveS()}}else sp.value=item.text};
    sp.onkeydown=e=>{if(e.key==='Enter')sp.blur()};
    const del=document.createElement('button'); del.className='cl-del'; del.textContent='×';
    del.onclick=()=>{const b=board();const f=findCard(b,mState.cardId);if(f){f.card.checklist.splice(i,1);saveS();renderModalCL(f.card)}};
    row.append(cb,sp,del); cl.appendChild(row);
  });
}

// update only the progress bar & pills in the board without full re-render
function renderBoardChecklist(){
  const b=board(); if(!b)return;
  b.columns.forEach(c=>c.cards.forEach(card=>{
    const el=document.querySelector(`.card[data-id="${card.id}"]`); if(!el)return;
    const total=card.checklist.length, done=card.checklist.filter(x=>x.done).length;
    const pb=el.querySelector('.prog-bar'); const pf=el.querySelector('.prog-fill');
    if(pb&&pf&&total>0){pf.style.width=Math.round(done/total*100)+'%'}
    const cp=el.querySelector('.cpill.cp-check,.cpill.cp-done');
    if(cp&&total>0){cp.textContent=`☑ ${done}/${total}`;cp.className='cpill '+(done===total?'cp-done':'cp-check')}
  }));
}

document.getElementById('cl-add').onclick=()=>{
  const inp=document.getElementById('cl-new'); const t=inp.value.trim(); if(!t)return;
  const b=board(); const f=findCard(b,mState.cardId);
  if(f){f.card.checklist.push({id:uid(),text:t,done:false});saveS();renderModalCL(f.card)}
  inp.value=''; inp.focus();
};
document.getElementById('cl-new').onkeydown=e=>{if(e.key==='Enter')document.getElementById('cl-add').click()};

function renderModalCmts(card){
  const cmts=card.comments||[];
  document.getElementById('cm-count').textContent=cmts.length;
  const el=document.getElementById('m-comments'); el.innerHTML='';
  if(!cmts.length){el.innerHTML='<p style="font-size:11px;color:var(--muted);padding:5px 0">Nenhum comentário ainda.</p>';return}
  cmts.forEach((cm,i)=>{
    const div=document.createElement('div'); div.className='comment';
    div.innerHTML=`${avEl(cm.userId,28)}<div class="cm-body"><div class="cm-meta"><span class="cm-author">${esc(S.users.find(u=>u.id===cm.userId)?.name||'?')}</span><span class="cm-time">${fmtTs(cm.ts)}</span><button class="cm-del" data-i="${i}">× remover</button></div><div class="cm-text">${esc(cm.text)}</div></div>`;
    div.querySelector('.cm-del').onclick=()=>{const b=board();const f=findCard(b,mState.cardId);if(f){f.card.comments.splice(i,1);saveS();renderModalCmts(f.card)}};
    el.appendChild(div);
  });
}
document.getElementById('cm-send').onclick=()=>{
  const inp=document.getElementById('cm-input'); const t=inp.value.trim(); if(!t)return;
  const b=board(); const f=findCard(b,mState.cardId);
  if(f){if(!f.card.comments)f.card.comments=[];f.card.comments.push({id:uid(),userId:session.userId,text:t,ts:Date.now()});saveS();renderModalCmts(f.card)}
  inp.value='';
};
document.getElementById('cm-input').onkeydown=e=>{if(e.key==='Enter'&&(e.ctrlKey||e.metaKey))document.getElementById('cm-send').click()};
document.getElementById('m-del').onclick=()=>dialog({title:'Excluir tarefa?',msg:'Esta ação não pode ser desfeita.',danger:true,okLabel:'Excluir'},ok=>{
  if(!ok)return;
  const b=board();for(const c of b.columns){const idx=c.cards.findIndex(k=>k.id===mState.cardId);if(idx!==-1){c.cards.splice(idx,1);break}}
  saveS(); document.getElementById('ov').classList.remove('open'); renderBoard(document.getElementById('search').value);
});

// ══════════════════════════════════════════════════════
// TOPBAR ACTIONS
// ══════════════════════════════════════════════════════
document.getElementById('btn-rename').onclick=()=>{
  const b=board(); if(!b)return;
  dialog({title:'Renomear quadro',input:true,defaultVal:b.name,okLabel:'Salvar'},name=>{if(!name)return;b.name=name;saveS();render()});
};
document.getElementById('btn-del-board').onclick=()=>{
  const b=board(); if(!b)return;
  dialog({title:'Excluir quadro?',msg:`"${b.name}" será removido permanentemente.`,danger:true,okLabel:'Excluir'},ok=>{
    if(!ok)return;
    // remove from groups
    S.groups.forEach(g=>{g.boardIds=g.boardIds.filter(id=>id!==S.active)});
    S.boards=S.boards.filter(b=>b.id!==S.active);
    S.active=S.boards[0]?.id||null; saveS(); render();
  });
};
document.getElementById('search').oninput=e=>renderBoard(e.target.value);
document.getElementById('btn-logout').onclick=logout;

// ══════════════════════════════════════════════════════
// SIDEBAR ACTIONS
// ══════════════════════════════════════════════════════
document.getElementById('sb-toggle').onclick=()=>{
  const sb=document.getElementById('sb'); sb.classList.toggle('col');
  document.getElementById('sb-toggle').textContent=sb.classList.contains('col')?'›':'‹';
};

document.getElementById('btn-new-grp').onclick=()=>{
  dialog({title:'Novo grupo',input:true,defaultVal:'Novo Grupo',okLabel:'Criar'},name=>{
    if(!name)return;
    const color=GRP_COLORS[S.groups.length%GRP_COLORS.length];
    S.groups.push({id:uid(),name:name.trim(),color,open:true,boardIds:[]});
    saveS(); renderSB();
  });
};

document.getElementById('btn-new-board').onclick=()=>{
  if(!S.groups.length){
    dialog({title:'Novo quadro',input:true,defaultVal:'Novo Quadro',okLabel:'Criar'},createBoard);
    return;
  }
  // pick group
  const opts=[{value:'__none',label:'Sem grupo'},...S.groups.map(g=>({value:g.id,label:g.name}))];
  dialog({title:'Novo quadro — escolha o grupo',select:true,options:opts,okLabel:'Próximo'},gid=>{
    dialog({title:'Nome do quadro',input:true,defaultVal:'Novo Quadro',okLabel:'Criar'},name=>{
      if(!name)return; createBoard(name,gid);
    });
  });
};

const BOARD_COLORS_LIST=['#4f9cf9','#34d399','#a78bfa','#fb923c','#f472b6','#fbbf24','#f87171','#60d8d8'];
function createBoard(name,groupId){
  if(!name)return;
  const color=BOARD_COLORS_LIST[S.boards.length%BOARD_COLORS_LIST.length];
  const b={id:uid(),name:name.trim(),color,memberIds:[session.userId],columns:[
    {id:uid(),title:'A fazer',cards:[]},
    {id:uid(),title:'Em andamento',cards:[]},
    {id:uid(),title:'Concluído',cards:[]},
  ]};
  S.boards.push(b);
  if(groupId&&groupId!=='__none'){const g=S.groups.find(x=>x.id===groupId);if(g)g.boardIds.push(b.id)}
  S.active=b.id; saveS(); render();
}

document.getElementById('btn-admin').onclick=openAdmin;
document.getElementById('admin-close').onclick=()=>document.getElementById('admin-ov').classList.remove('open');

function openAdmin(){
  renderUserList();
  document.getElementById('admin-ov').classList.add('open');
  document.getElementById('new-u-name').value='';
  document.getElementById('new-u-user').value='';
  document.getElementById('new-u-pass').value='';
  document.getElementById('admin-err').textContent='';
}
function renderUserList(){
  const ul=document.getElementById('user-list'); ul.innerHTML='';
  S.users.forEach(u=>{
    const row=document.createElement('div'); row.className='user-row';
    row.innerHTML=`
      <div class="user-av" style="background:${u.color}22;color:${u.color}">${avInitials(u.name)}</div>
      <div class="user-info"><div class="user-info-name">${esc(u.name)} <span style="font-size:10px;color:var(--muted)">(${esc(u.username)})</span></div><div class="user-info-role">${u.role}</div></div>
      <button class="user-del" data-uid="${u.id}" title="Remover">×</button>
    `;
    row.querySelector('.user-del').onclick=()=>{
      if(u.id===session.userId){document.getElementById('admin-err').textContent='Não pode remover a si mesmo.';return}
      S.users=S.users.filter(x=>x.id!==u.id); saveS(); renderUserList();
    };
    ul.appendChild(row);
  });
}
document.getElementById('add-user-btn').onclick=()=>{
  const name=document.getElementById('new-u-name').value.trim();
  const uname=document.getElementById('new-u-user').value.trim().replace(/\s/g,'');
  const pass=document.getElementById('new-u-pass').value;
  const role=document.getElementById('new-u-role').value;
  const err=document.getElementById('admin-err');
  if(!name||!uname||!pass){err.textContent='Preencha todos os campos.';return}
  if(S.users.find(u=>u.username===uname)){err.textContent='Nome de usuário já existe.';return}
  err.textContent='';
  const color=AV_COLORS[S.users.length%AV_COLORS.length];
  S.users.push({id:uid(),name,username:uname,password:pass,role,color});
  saveS(); renderUserList();
  document.getElementById('new-u-name').value='';
  document.getElementById('new-u-user').value='';
  document.getElementById('new-u-pass').value='';
};
