<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PET Estatística — Gestão</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<!-- CSS Modules -->
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/utilities.css">
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
  <div class="loading-logo">PE</div>
  <div class="loading-dots"><span></span><span></span><span></span></div>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-brand-icon">PE</div>
      <div class="login-brand-text">
        <strong>PET Estatística</strong>
        <span>UFSCar — Gestão de Projetos</span>
      </div>
    </div>
    <h2>Entrar na plataforma</h2>
    <div class="field">
      <label>E-mail</label>
      <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="login-err" id="login-err"></div>
    <button class="btn-primary" id="btn-login">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <aside id="sidebar">
    <div class="sb-header">
      <div class="sb-logo">PE</div>
      <span class="sb-title sb-label">PET Estatística</span>
      <button id="sb-collapse" title="Recolher/Expandir">‹</button>
    </div>
    <div class="sb-user">
      <div class="sb-user-av" id="sb-avatar"></div>
      <div class="sb-user-info sb-label">
        <div class="sb-user-name" id="sb-user-name"></div>
        <div class="sb-user-role" id="sb-user-role"></div>
      </div>
      <button id="btn-logout" title="Sair">⏻</button>
    </div>
    <button class="sb-btn" id="btn-calendar" style="margin: 12px 14px 4px; width: calc(100% - 28px); background: rgba(138,21,56,.12); color: var(--accent); font-weight: 600;">
      <span class="sb-btn-icon">📅</span><span class="sb-label">Meu Calendário</span>
    </button>
    <nav class="sb-nav" id="sb-nav"></nav>
    <div class="sb-footer">
      <button class="sb-btn" id="btn-new-group"><span class="sb-btn-icon">＋</span><span class="sb-label">Novo grupo</span></button>
      <button class="sb-btn" id="btn-new-board"><span class="sb-btn-icon">＋</span><span class="sb-label">Novo quadro</span></button>
      <button class="sb-btn" id="btn-admin" style="display:none"><span class="sb-btn-icon">⚙</span><span class="sb-label">Usuários</span></button>
      <button class="sb-btn" id="btn-change-pass"><span class="sb-btn-icon">🔑</span><span class="sb-label">Alterar senha</span></button>
    </div>
  </aside>

  <main id="main">
    <div id="topbar">
      <button id="btn-theme-toggle" title="Alternar tema" style="margin-left: auto; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: var(--r); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px;">☀️</button>
      <div id="board-meta" style="display:none">
        <span id="board-title-text"></span>
        <button class="tb-action" id="btn-rename-board">Renomear</button>
        <button class="tb-action" id="btn-members-board">👥 Membros</button>
        <button class="tb-action danger" id="btn-del-board">Excluir</button>
        <div class="tb-members" id="tb-members"></div>
      </div>
      <input type="search" id="topbar-search" placeholder="🔍 Buscar tarefas..." style="display:none">
    </div>

    <div id="empty-state">
      <div class="empty-icon">☰</div>
      <p>Selecione ou crie um quadro</p>
      <small>Use o painel lateral para navegar</small>
    </div>

    <div id="board-wrap" style="display:none"></div>
    <div id="calendar-wrap" style="display:none"></div>
  </main>
</div>

<!-- MODAL CARD -->
<div id="modal-overlay">
  <div id="modal">
    <div class="modal-head">
      <span class="modal-col-badge" id="modal-col-label"></span>
      <input type="text" id="modal-title" placeholder="Título da tarefa">
      <button id="modal-close">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-main">
        <div class="m-section">
          <label>Descrição</label>
          <textarea id="modal-desc" placeholder="Descreva a tarefa..."></textarea>
        </div>
        <div class="m-section">
          <label>Etiquetas</label>
          <div class="tags-grid" id="modal-tags"></div>
        </div>
        <div class="m-section">
          <label>Checklist <span id="cl-summary" style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text2)">0/0</span></label>
          <div id="cl-progress-wrap" style="display:none" class="cl-progress">
            <div class="cl-bar"><div class="cl-bar-fill" id="cl-bar-fill"></div></div>
            <span class="cl-pct" id="cl-pct">0%</span>
          </div>
          <div id="modal-checklist"></div>
          <div class="cl-add-row">
            <input type="text" class="cl-new-input" id="cl-new-input" placeholder="Novo item...">
            <button class="cl-add-btn" id="cl-add-btn">+</button>
          </div>
        </div>
        <div class="m-section">
          <label>Comentários <span id="cm-count" style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text2)">0</span></label>
          <div id="modal-comments"></div>
          <div class="cm-compose">
            <textarea id="cm-input" placeholder="Comentário... (Ctrl+Enter para enviar)"></textarea>
            <button class="btn-save" id="cm-send" style="align-self:flex-end;font-size:11px;padding:7px 11px">Enviar</button>
          </div>
        </div>
      </div>
      <div class="modal-side">
        <div class="m-section">
          <label>Prazo</label>
          <input type="date" id="modal-due">
        </div>
        <div class="m-section">
          <label>Responsáveis</label>
          <div class="assignee-list" id="modal-assignees"></div>
        </div>
        <div class="m-section">
          <label>Informações</label>
          <div class="m-side-card" id="modal-info"></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-danger" id="modal-del-card">🗑 Excluir tarefa</button>
      <span style="margin-left:auto;font-size:11px;color:var(--text3)">Salvo ao fechar</span>
    </div>
  </div>
</div>

<!-- DIALOG -->
<div id="dialog-overlay">
  <div id="dialog">
    <h3 id="dlg-title"></h3>
    <p id="dlg-msg" style="display:none"></p>
    <input type="text" id="dlg-inp" style="display:none">
    <select id="dlg-sel" style="display:none"></select>
    <div class="dlg-actions">
      <button class="dlg-cancel" id="dlg-cancel">Cancelar</button>
      <button class="dlg-ok" id="dlg-ok">OK</button>
    </div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-overlay">
  <div id="admin-panel">
    <div class="admin-head">
      <h2>⚙ Gerenciar Usuários</h2>
      <button id="admin-close">×</button>
    </div>
    <div class="admin-body">
      <div id="user-list"></div>
      <div class="admin-add-section">
        <h4>Adicionar usuário</h4>
        <div class="admin-grid">
          <input type="text"     id="nu-name"  placeholder="Nome completo" class="span2">
          <input type="email"    id="nu-email" placeholder="E-mail">
          <input type="password" id="nu-pass"  placeholder="Senha inicial">
          <select id="nu-role" class="span2">
            <option value="membro">Membro</option>
            <option value="tutor">Tutor</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="admin-actions">
          <span class="admin-err" id="admin-err"></span>
          <button class="btn-save" id="btn-add-user">Criar usuário</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MEMBERS PANEL -->
<div id="members-overlay">
  <div id="members-panel">
    <div class="members-head">
      <h2 id="members-panel-title">👥 Membros do quadro</h2>
      <button id="members-close">×</button>
    </div>
    <div class="members-body">
      <h4>Membros atuais</h4>
      <div id="current-members-list"></div>
      <hr class="members-divider">
      <h4>Adicionar membros</h4>
      <div class="members-add-list" id="add-members-list"></div>
    </div>
    <div class="members-footer">
      <button class="btn-save" id="btn-save-members">Salvar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast-container"></div>

<!-- JavaScript Modules -->
<script type="module" src="js/main.js"></script>

</body>
</html>
