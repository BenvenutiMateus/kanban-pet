<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PET Estatística — Gestão</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════
   TOKENS
════════════════════════════════════════════════ */
:root {
  --pet-burgundy: #8a1538;
  --bg:         #080506;
  --surface:    #1a060c;
  --surface2:   #2d0a15;
  --surface3:   #4a1022;
  --border:     rgba(138, 21, 56, .2);
  --border2:    rgba(138, 21, 56, .4);
  --accent:     var(--pet-burgundy);
  --accent2:    #a31a42;
  --green:      #34d399;
  --red:        #f87171;
  --yellow:     #fbbf24;
  --purple:     #a78bfa;
  --orange:     #fb923c;
  --pink:       #f472b6;
  --text:       #f9f0f2;
  --text2:      #ccb8be;
  --text3:      #886d75;
  --shadow:     0 8px 32px rgba(0,0,0,.6);
  --r-sm: 8px; --r: 12px; --r-lg: 18px;
  --font-display: 'Syne', sans-serif;
  --font-body:    'DM Sans', sans-serif;
  --ease: cubic-bezier(.4,0,.2,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font-body);
  font-size: 14px;
  background: var(--bg);
  color: var(--text);
  display: flex;
  user-select: none;
  -webkit-user-select: none;
}
button { font-family: var(--font-body); cursor: pointer; }
input, textarea, select {
  font-family: var(--font-body);
  user-select: auto;
  -webkit-user-select: auto;
}
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }
::selection { background: rgba(138,21,56,.3); }

/* ════ LOADING ════ */
#loading-screen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999; flex-direction: column; gap: 20px;
  transition: opacity .4s var(--ease);
}
#loading-screen.hidden { opacity: 0; pointer-events: none; }
.loading-logo {
  width: 52px; height: 52px; background: var(--accent);
  border-radius: var(--r); display: flex; align-items: center;
  justify-content: center; font-family: var(--font-display);
  font-weight: 800; font-size: 20px; color: #fff;
  animation: pulse-logo 2s ease-in-out infinite;
}
@keyframes pulse-logo {
  0%,100% { box-shadow: 0 0 40px rgba(138,21,56,.4); }
  50%      { box-shadow: 0 0 60px rgba(138,21,56,.7); }
}
.loading-dots { display: flex; gap: 6px; }
.loading-dots span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text3);
  animation: loading-bounce .8s ease-in-out infinite;
}
.loading-dots span:nth-child(2) { animation-delay: .15s; }
.loading-dots span:nth-child(3) { animation-delay: .3s; }
@keyframes loading-bounce {
  0%,80%,100% { transform: scale(.8); opacity: .4; }
  40%         { transform: scale(1); opacity: 1; background: var(--accent); }
}

/* ════ LOGIN ════ */
#login-screen {
  position: fixed; inset: 0; background: var(--bg);
  display: none; align-items: center; justify-content: center;
  z-index: 1000; overflow: hidden;
}
#login-screen.visible { display: flex; }
#login-screen::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 50%, rgba(138,21,56,.1) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 80% 50%, rgba(138,21,56,.07) 0%, transparent 60%);
}
.login-card {
  position: relative; z-index: 1;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r-lg);
  padding: 44px 48px;
  width: 400px; max-width: 95vw;
  box-shadow: var(--shadow);
  animation: slide-up .4s var(--ease);
}
@keyframes slide-up {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
.login-brand { display: flex; align-items: center; gap: 14px; margin-bottom: 32px; }
.login-brand-icon {
  width: 48px; height: 48px; background: var(--accent);
  border-radius: var(--r); display: flex; align-items: center;
  justify-content: center; font-family: var(--font-display);
  font-weight: 800; font-size: 18px; color: #fff;
  box-shadow: 0 4px 20px rgba(138,21,56,.35);
}
.login-brand-text { display: flex; flex-direction: column; gap: 2px; }
.login-brand-text strong { font-family: var(--font-display); font-weight: 700; font-size: 16px; }
.login-brand-text span { font-size: 12px; color: var(--text2); }
.login-card h2 { font-family: var(--font-display); font-size: 22px; font-weight: 700; margin-bottom: 24px; }
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.field label { font-size: 11px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: .8px; }
.field input {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text); padding: 11px 14px;
  border-radius: var(--r-sm); font-size: 14px; outline: none;
  transition: border-color .2s;
}
.field input:focus { border-color: var(--accent); }
.login-err { font-size: 12px; color: var(--red); min-height: 18px; margin-bottom: 4px; display: flex; align-items: center; gap: 5px; }
.btn-primary {
  width: 100%; background: var(--accent);
  border: none; color: #fff;
  padding: 12px; border-radius: var(--r-sm);
  font-family: var(--font-display); font-weight: 700;
  font-size: 14px; letter-spacing: .3px;
  transition: all .2s var(--ease);
  box-shadow: 0 4px 16px rgba(138,21,56,.3);
}
.btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: .6; pointer-events: none; }

/* ════ APP LAYOUT ════ */
#app { display: flex; width: 100%; height: 100%; opacity: 0; transition: opacity .4s var(--ease); }
#app.visible { opacity: 1; }

/* ════ SIDEBAR ════ */
#sidebar {
  width: 260px; min-width: 260px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  transition: width .25s var(--ease), min-width .25s var(--ease);
  overflow: hidden; z-index: 10;
}
#sidebar.collapsed { width: 56px; min-width: 56px; }
#sidebar.collapsed .sb-label { display: none !important; }
#sidebar.collapsed .sb-arrow { display: none !important; }
#sidebar.collapsed .sb-logo { display: none; }
#sidebar.collapsed .sb-header { padding: 0; justify-content: center; }
#sidebar.collapsed #sb-collapse { display: flex !important; font-size: 22px; padding: 10px; }

.sb-header {
  height: 56px; padding: 0 14px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.sb-logo {
  width: 32px; height: 32px; min-width: 32px;
  background: var(--accent); border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-weight: 800; font-size: 13px; color: #fff;
}
.sb-title { font-family: var(--font-display); font-weight: 700; font-size: 14px; white-space: nowrap; flex: 1; }
#sb-collapse {
  background: none; border: none; color: var(--text3);
  font-size: 18px; padding: 2px; line-height: 1; transition: color .15s;
}
#sb-collapse:hover { color: var(--text); }

.sb-user {
  padding: 12px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 9px; flex-shrink: 0;
}
.sb-user-av { width: 30px; height: 30px; min-width: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
.sb-user-info { flex: 1; min-width: 0; }
.sb-user-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sb-user-role { font-size: 10px; color: var(--text2); margin-top: 1px; }
#btn-logout { background: none; border: none; color: var(--text3); font-size: 17px; padding: 3px; transition: color .15s; }
#btn-logout:hover { color: var(--red); }

.sb-nav { flex: 1; overflow-y: auto; padding: 8px 0; }
.sb-group { margin-bottom: 2px; }
.sb-group-header {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 14px; cursor: pointer; user-select: none;
  transition: background .15s;
}
.sb-group-header:hover { background: rgba(255,255,255,.03); }
.sb-group-dot { width: 8px; height: 8px; min-width: 8px; border-radius: 2px; }
.sb-group-name { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .9px; flex: 1; }
.sb-arrow { font-size: 10px; color: var(--text3); transition: transform .2s var(--ease); }
.sb-arrow.open { transform: rotate(90deg); }
.sb-group-boards { overflow: hidden; transition: max-height .25s var(--ease); }
.sb-board-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 14px 6px 30px; cursor: pointer;
  transition: background .15s; position: relative;
}
.sb-board-item:hover { background: rgba(255,255,255,.04); }
.sb-board-item.active { background: rgba(138,21,56,.12); }
.sb-board-item.active .sb-board-name { color: var(--accent); font-weight: 500; }
.sb-board-name { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.sb-footer { padding: 10px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 3px; flex-shrink: 0; }
.sb-btn {
  background: none; border: none; color: var(--text2);
  padding: 7px 10px; border-radius: var(--r-sm); font-size: 12px;
  display: flex; align-items: center; gap: 8px;
  transition: all .15s; text-align: left; width: 100%;
}
.sb-btn:hover { background: var(--surface2); color: var(--text); }
.sb-btn-icon { font-size: 14px; width: 16px; text-align: center; flex-shrink: 0; }

/* ════ MAIN ════ */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

#topbar {
  height: 56px; background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 20px; display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
#board-meta { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
#board-title-text {
  font-family: var(--font-display); font-weight: 700; font-size: 16px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 240px;
}
.tb-action {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); padding: 5px 12px; border-radius: var(--r-sm);
  font-size: 11px; font-weight: 500; transition: all .15s; white-space: nowrap;
}
.tb-action:hover { border-color: var(--accent); color: var(--accent); }
.tb-action.danger:hover { border-color: var(--red); color: var(--red); }
.tb-members { display: flex; }
.tb-av {
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; border: 2px solid var(--surface);
  margin-left: -7px; position: relative; cursor: default;
}
.tb-av:first-child { margin-left: 0; }
#topbar-search {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 6px 12px; border-radius: var(--r-sm);
  font-size: 12px; outline: none; width: 200px; transition: border-color .2s, width .2s;
}
#topbar-search:focus { border-color: var(--accent); width: 240px; }
#topbar-search::placeholder { color: var(--text3); }

/* ════ EMPTY STATE ════ */
#empty-state { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; color: var(--text3); }
.empty-icon { width: 72px; height: 72px; border: 2px dashed var(--surface3); border-radius: var(--r-lg); display: flex; align-items: center; justify-content: center; font-size: 28px; opacity: .5; }
#empty-state p { font-size: 14px; color: var(--text2); }
#empty-state small { font-size: 12px; color: var(--text3); }

/* ════ BOARD ════ */
#board-wrap { flex: 1; overflow-x: auto; overflow-y: hidden; padding: 16px; display: flex; gap: 14px; align-items: flex-start; }

/* ════ COLUMN ════ */
.kanban-col {
  width: 272px; min-width: 272px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); display: flex; flex-direction: column;
  max-height: 100%; animation: col-in .3s var(--ease);
}
@keyframes col-in {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.col-head { padding: 12px 12px 10px; display: flex; align-items: center; gap: 7px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.col-color-bar { width: 4px; height: 18px; border-radius: 2px; flex-shrink: 0; }
.col-title { flex: 1; background: none; border: none; color: var(--text); font-family: var(--font-display); font-weight: 600; font-size: 13px; outline: none; cursor: default; }
.col-title:focus { cursor: text; }
.col-count { font-size: 10px; font-weight: 700; color: var(--text3); background: var(--surface2); padding: 2px 7px; border-radius: 20px; }
.col-delete { background: none; border: none; color: var(--text3); font-size: 18px; line-height: 1; padding: 0 2px; border-radius: 4px; transition: all .15s; }
.col-delete:hover { color: var(--red); background: rgba(248,113,113,.1); }

.cards-container { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; min-height: 40px; }
.cards-container.drag-over { background: rgba(138,21,56,.06); border-radius: var(--r-sm); outline: 2px dashed rgba(138,21,56,.4); outline-offset: -2px; }

/* ════ CARD ════ */
.card {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--r-sm); padding: 10px 11px;
  cursor: pointer; position: relative;
  transition: transform .15s var(--ease), box-shadow .15s, border-color .15s, background .15s;
  user-select: none; animation: card-in .25s var(--ease);
}
@keyframes card-in {
  from { opacity: 0; transform: scale(.97); }
  to   { opacity: 1; transform: scale(1); }
}
.card:hover { background: var(--surface3); border-color: var(--border2); transform: translateY(-2px); box-shadow: var(--shadow); }
.card.dragging { opacity: .35; cursor: grabbing; transform: rotate(2deg); }
.card.done { opacity: .55; }
.card.done .card-title { text-decoration: line-through; color: var(--text2); }

.card-done-btn {
  position: absolute; top: 10px; right: 10px;
  width: 22px; height: 22px; border-radius: 50%;
  border: 1.5px solid var(--border2); background: var(--surface);
  color: var(--text3); font-size: 11px;
  display: none; align-items: center; justify-content: center; transition: all .15s; z-index: 2;
}
.card:hover .card-done-btn { display: flex; }
.card.done .card-done-btn { display: flex; border-color: var(--green); color: var(--green); background: rgba(52,211,153,.1); }
.card-done-btn:hover { border-color: var(--green); color: var(--green); background: rgba(52,211,153,.15); }

.card-tags { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 7px; }
.tag { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }

.card-progress-bar { height: 2px; background: var(--surface3); border-radius: 1px; margin-bottom: 8px; overflow: hidden; }
.card-progress-fill { height: 100%; background: var(--green); border-radius: 1px; transition: width .3s var(--ease); }

.card-title { font-size: 13px; font-weight: 400; line-height: 1.4; margin-bottom: 5px; padding-right: 26px; color: var(--text); }
.card-desc-preview { font-size: 11px; color: var(--text2); line-height: 1.4; margin-bottom: 7px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

.card-footer { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
.card-pill { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; }
.pill-ok    { background: rgba(138,21,56,.1);  color: #e57a8a; }
.pill-late  { background: rgba(248,113,113,.1); color: var(--red); }
.pill-done  { background: rgba(52,211,153,.1);  color: var(--green); }
.pill-check { background: rgba(52,211,153,.08); color: var(--green); }
.pill-cmt   { background: rgba(138,21,56,.08);  color: #e57a8a; }

.card-assignees { display: flex; margin-left: auto; }
.card-av { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; border: 1.5px solid var(--surface2); margin-left: -5px; }
.card-av:first-child { margin-left: 0; }

.col-add-btn { margin: 6px 8px 8px; padding: 7px 10px; background: none; border: 1px dashed var(--border); color: var(--text3); border-radius: var(--r-sm); font-size: 12px; display: flex; align-items: center; gap: 5px; transition: all .15s; }
.col-add-btn:hover { border-color: var(--accent); color: var(--accent); }
.col-add-form { padding: 8px; display: none; flex-direction: column; gap: 6px; }
.col-add-form.open { display: flex; }
.col-add-input { background: var(--surface3); border: 1px solid var(--border2); color: var(--text); padding: 8px 10px; border-radius: var(--r-sm); font-size: 13px; outline: none; resize: none; font-family: var(--font-body); }
.col-add-input:focus { border-color: var(--accent); }
.col-add-actions { display: flex; gap: 6px; }
.btn-save { background: var(--accent); border: none; color: #fff; padding: 6px 14px; border-radius: var(--r-sm); font-size: 12px; font-weight: 600; transition: all .15s; }
.btn-save:hover { background: var(--accent2); }
.btn-cancel { background: none; border: 1px solid var(--border); color: var(--text2); padding: 6px 12px; border-radius: var(--r-sm); font-size: 12px; transition: all .15s; }
.btn-cancel:hover { color: var(--text); }

#add-col-btn {
  width: 272px; min-width: 272px; align-self: flex-start;
  background: rgba(255,255,255,.02); border: 1.5px dashed var(--border);
  border-radius: var(--r); padding: 14px; color: var(--text3); font-size: 13px;
  display: flex; align-items: center; justify-content: center; gap: 7px; transition: all .2s;
}
#add-col-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(138,21,56,.04); }

/* ════ MODAL ════ */
#modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.75); backdrop-filter: blur(4px);
  display: none; align-items: flex-start; justify-content: center;
  z-index: 100; padding: 40px 16px; overflow-y: auto;
}
#modal-overlay.open { display: flex; }
#modal {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--r-lg); width: 660px; max-width: 100%;
  flex-shrink: 0; animation: modal-in .2s var(--ease);
}
@keyframes modal-in {
  from { opacity: 0; transform: translateY(-12px) scale(.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.modal-head { padding: 18px 22px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.modal-col-badge { font-size: 10px; font-weight: 700; color: var(--text2); background: var(--surface2); padding: 3px 10px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
#modal-title { flex: 1; background: none; border: none; color: var(--text); font-family: var(--font-display); font-weight: 600; font-size: 17px; outline: none; min-width: 0; }
#modal-title:focus { border-bottom: 2px solid var(--accent); }
#modal-close { background: none; border: none; color: var(--text2); font-size: 22px; line-height: 1; flex-shrink: 0; transition: color .15s; }
#modal-close:hover { color: var(--text); }

.modal-body { padding: 18px 22px; display: flex; gap: 22px; }
.modal-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 18px; }
.modal-side { width: 170px; flex-shrink: 0; display: flex; flex-direction: column; gap: 14px; }

.m-section label { display: block; font-size: 10px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .9px; margin-bottom: 8px; }
.m-section textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 9px 11px; border-radius: var(--r-sm); font-size: 13px; font-family: var(--font-body); outline: none; resize: vertical; min-height: 72px; transition: border-color .2s; }
.m-section textarea:focus { border-color: var(--accent); }

.tags-grid { display: flex; flex-wrap: wrap; gap: 5px; }
.tag-toggle { padding: 3px 11px; border-radius: 20px; font-size: 10px; font-weight: 700; border: 2px solid transparent; cursor: pointer; opacity: .4; transition: opacity .15s, border-color .15s; }
.tag-toggle.active { opacity: 1; border-color: rgba(255,255,255,.25); }

.assignee-list { display: flex; flex-direction: column; gap: 3px; max-height: 150px; overflow-y: auto; }
.assignee-row { display: flex; align-items: center; gap: 8px; padding: 5px 7px; border-radius: var(--r-sm); cursor: pointer; transition: background .1s; }
.assignee-row:hover { background: var(--surface2); }
.assignee-row input[type=checkbox] { accent-color: var(--accent); width: 13px; height: 13px; flex-shrink: 0; }
.assignee-row span { font-size: 12px; }

function fmtDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}
function fmtTs(ts) {
  return new Date(ts).toLocaleDateString('pt-BR',{ day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
}

function toast(msg, type = 'info') {
  const c  = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast';
  el.style.borderLeft = `3px solid ${type==='error'?'var(--red)':type==='success'?'var(--green)':'var(--accent)'}`;
  el.textContent = (type==='error'?'✕ ':type==='success'?'✓ ':'') + msg;
  c.appendChild(el);
  setTimeout(()=>{ el.classList.add('out'); setTimeout(()=>el.remove(), 300); }, 3000);
}

let _dlgCb = null;

function dialog({ title, msg, input, inputType='text', select, options, defaultVal='', okLabel='OK', danger=false }, cb) {
  _dlgCb = cb;
  document.getElementById('dlg-title').textContent = title;
  const p   = document.getElementById('dlg-msg');
  const inp = document.getElementById('dlg-inp');
  const sel = document.getElementById('dlg-sel');
  p.style.display   = msg    ? '' : 'none'; if (msg) p.textContent = msg;
  inp.style.display = input  ? '' : 'none';
  if (input) { inp.type = inputType; inp.value = defaultVal; setTimeout(()=>{ inp.focus(); inp.select(); }, 80); }
  sel.style.display = select ? '' : 'none';
  if (select && options) sel.innerHTML = options.map(o=>`<option value="${esc(o.value)}">${esc(o.label)}</option>`).join('');
  const ok = document.getElementById('dlg-ok');
  ok.textContent = okLabel;
  ok.className   = 'dlg-ok' + (danger ? ' is-danger' : '');
  document.getElementById('dialog-overlay').classList.add('open');
}

document.getElementById('dlg-ok').onclick = () => {
  document.getElementById('dialog-overlay').classList.remove('open');
  if (!_dlgCb) return;
  const inp = document.getElementById('dlg-inp');
  const sel = document.getElementById('dlg-sel');
  if (inp.style.display !== 'none')  _dlgCb(inp.value.trim());
  else if (sel.style.display !== 'none') _dlgCb(sel.value);
  else _dlgCb(true);
};
document.getElementById('dlg-cancel').onclick = () => document.getElementById('dialog-overlay').classList.remove('open');
document.getElementById('dlg-inp').onkeydown = e => {
  if (e.key === 'Enter')  document.getElementById('dlg-ok').click();
  if (e.key === 'Escape') document.getElementById('dlg-cancel').click();
};

function setLocalNav(boardId, view = 'board') {

function activeBoard() {
  return STATE.boards[_activeBoardId] || null;

function me()      { return currentUser ? STATE.users[currentUser.uid] : null; }

// ── Firestore helpers ──────────────────────────────────
async function saveMeta(patch) {
  // NUNCA salva activeBoard no Firestore — remove se vier
  delete patch.activeBoard;
  Object.assign(STATE.meta, patch);
  await setDoc(doc(db,'meta','app'), STATE.meta);
}

async function saveBoard(boardId) {
  const b = STATE.boards[boardId]; if (!b) return;
  await setDoc(doc(db,'boards',boardId), b);
}

async function saveUser(uid2, data) {
  await setDoc(doc(db,'users',uid2), data, { merge:true })
    .catch(e => toast('Erro ao salvar usuário: '+e.message,'error'));
}

// ── Listeners ──────────────────────────────────────────
function startListeners() {
  stopListeners();

  // meta — ignora o campo activeBoard do servidor
  unsubs.push(onSnapshot(doc(db,'meta','app'), snap => {
    if (snap.exists()) {
      const data = snap.data();
      delete data.activeBoard; // garante que o campo do servidor nunca afeta a navegação local
      STATE.meta = { ...STATE.meta, ...data };
    } else {
      setDoc(doc(db,'meta','app'), { groups:[] });
    }
    renderAll();
  }));

  // users
  unsubs.push(onSnapshot(collection(db,'users'), snap => {
    snap.forEach(d => { STATE.users[d.id] = { id:d.id, ...d.data() }; });
    snap.docChanges().forEach(ch => { if (ch.type==='removed') delete STATE.users[ch.doc.id]; });
    renderAll();
  }));

  // boards
  unsubs.push(onSnapshot(collection(db,'boards'), snap => {
    snap.forEach(d => { STATE.boards[d.id] = { id:d.id, ...d.data() }; });
    snap.docChanges().forEach(ch => { if (ch.type==='removed') delete STATE.boards[ch.doc.id]; });
    renderAll();
  }));
}

function stopListeners() { unsubs.forEach(u=>u()); unsubs=[]; }

// ════════════════════════════════════════════════════════
onAuthStateChanged(auth, async user => {
  hideLoading();
  if (user) {
    currentUser = user;
    const uref = doc(db,'users',user.uid);
    const snap = await getDoc(uref);
    if (!snap.exists()) {
      const colorIdx = Math.floor(Math.random() * AV_COLORS.length);
      await saveUser(user.uid, {
        name:  user.displayName || user.email.split('@')[0],
        email: user.email,
        role:  'membro',
        color: AV_COLORS[colorIdx],
      });
    }
    startListeners();
    showApp();
  } else {
    currentUser = null;
    stopListeners();
    showLogin();
  }
});

document.getElementById('btn-login').onclick = doLogin;
document.getElementById('login-pass').onkeydown   = e => { if (e.key==='Enter') doLogin(); };
document.getElementById('login-email').onkeydown  = e => { if (e.key==='Enter') document.getElementById('login-pass').focus(); };

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const err   = document.getElementById('login-err');
  const btn   = document.getElementById('btn-login');
  if (!email || !pass) { err.textContent='Preencha e-mail e senha.'; return; }
  err.textContent=''; btn.disabled=true; btn.textContent='Entrando...';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    const msgs = {
      'auth/user-not-found':    'Usuário não encontrado.',
      'auth/wrong-password':    'Senha incorreta.',
      'auth/invalid-email':     'E-mail inválido.',
      'auth/too-many-requests': 'Muitas tentativas. Tente mais tarde.',
    };
    err.textContent = msgs[e.code] || 'Falha no acesso. Verifique suas credenciais.';
  } finally {
    btn.disabled=false; btn.textContent='Entrar';
  }
}

document.getElementById('btn-logout').onclick = () => signOut(auth);

// Retorna true se o usuário está no meio de uma edição — não interromper
function isBoardBusy() {
  if (document.querySelector('.col-add-form.open'))               return true;
  if (document.getElementById('modal-overlay').classList.contains('open')) return true;
  if (document.querySelector('.col-title:not([readonly])'))       return true;
  return false;
}

let _lastBoardHash = '';

function renderAll() { renderSidebar(); renderBoard(); }

// ── Sidebar ───────────────────────────────────────────
function renderSidebar() {
  const u = me(); if (!u) return;

  const av = document.getElementById('sb-avatar');
  av.style.cssText = `width:30px;height:30px;min-width:30px;border-radius:50%;background:${u.color}22;color:${u.color};font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;`;
  av.textContent = initials(u.name);
  document.getElementById('sb-user-name').textContent = u.name;
  document.getElementById('sb-user-role').textContent = u.role.charAt(0).toUpperCase()+u.role.slice(1);
  document.getElementById('btn-admin').style.display = isAdmin() ? '' : 'none';

  // Destaca botão calendário se ativo
  const calBtn = document.getElementById('btn-calendar');
  calBtn.style.background = (_currentView==='calendar') ? 'rgba(138,21,56,.25)' : 'rgba(138,21,56,.12)';

  const nav = document.getElementById('sb-nav');
  nav.innerHTML = '';

  const groups     = STATE.meta.groups || [];
  const allBoards  = Object.values(STATE.boards);
  const groupedIds = new Set(groups.flatMap(g=>g.boardIds||[]));
  const isAdm      = isAdmin();
  const myBoards   = allBoards.filter(b => isAdm || (b.memberIds && b.memberIds.includes(currentUser.uid)));
  const myBoardIds = new Set(myBoards.map(b=>b.id));

  groups.forEach(g => {
    const gBoards = (g.boardIds||[]).filter(id=>myBoardIds.has(id)).map(id=>STATE.boards[id]).filter(Boolean);
    if (!isAdm && gBoards.length===0) return;

    // estado open/close é local — não sincroniza com Firestore
    const openKey = 'grp_open_' + g.id;
    const open = localStorage.getItem(openKey) !== 'false';
    const grp  = document.createElement('div');
    grp.className = 'sb-group';
    grp.innerHTML = `
      <div class="sb-group-header" data-gid="${g.id}">
        <div class="sb-group-dot" style="background:${g.color}"></div>
        <span class="sb-group-name sb-label">${esc(g.name)}</span>
        <button class="grp-del sb-label" title="Excluir grupo" style="background:none;border:none;color:var(--text3);font-size:16px;padding:0 6px;margin-left:auto;line-height:1;" onmouseenter="this.style.color='var(--red)'" onmouseleave="this.style.color='var(--text3)'">×</button>
        <span class="sb-arrow sb-label ${open?'open':''}">▶</span>
      </div>
      <div class="sb-group-boards" style="max-height:${open?'600px':'0'}"></div>
    `;
    const boardsDiv = grp.querySelector('.sb-group-boards');
    gBoards.forEach(b => boardsDiv.appendChild(sbBoardItem(b)));

    grp.querySelector('.sb-group-header').onclick = e => {
      if (e.target.classList.contains('grp-del')) return;
      const isOpen = localStorage.getItem(openKey) !== 'false';
      localStorage.setItem(openKey, isOpen ? 'false' : 'true');
      // só re-renderiza a sidebar — não mexe no board
      renderSidebar();
    };
    grp.querySelector('.grp-del').onclick = e => {
      e.stopPropagation();
      dialog({ title:'Excluir grupo?', msg:`O grupo "${g.name}" será removido. Os quadros não serão apagados.`, danger:true, okLabel:'Excluir' }, async ok => {
        if (!ok) return;
        await saveMeta({ groups: STATE.meta.groups.filter(x=>x.id!==g.id) });
        toast('Grupo removido');
      });
    };
    nav.appendChild(grp);
  });

  // sem grupo
  const ungrouped = myBoards.filter(b=>!groupedIds.has(b.id));
  if (ungrouped.length) {
    const sep = document.createElement('div');
    sep.className='sb-group-header'; sep.style.cursor='default';
    sep.innerHTML=`<div class="sb-group-dot" style="background:var(--text3)"></div><span class="sb-group-name sb-label">Sem grupo</span>`;
    nav.appendChild(sep);
    ungrouped.forEach(b=>nav.appendChild(sbBoardItem(b)));
  }
}

function sbBoardItem(b) {
  const el = document.createElement('div');
  const isActive = (b.id===_activeBoardId && _currentView==='board');
  el.className = 'sb-board-item' + (isActive?' active':'');
  el.innerHTML = `<span style="width:7px;height:7px;min-width:7px;border-radius:2px;background:${b.color};display:inline-block;"></span><span class="sb-board-name sb-label">${esc(b.name)}</span>`;
  el.onclick = () => { setLocalNav(b.id, 'board'); renderAll(); };
  return el;
}

document.getElementById('btn-calendar').onclick = () => {

function renderBoard() {
  // Não interrompe edição ativa (formulário aberto, modal aberto, título sendo editado)
  if (isBoardBusy()) return;

  const wrap    = document.getElementById('board-wrap');
  const empty   = document.getElementById('empty-state');
  const meta    = document.getElementById('board-meta');
  const search  = document.getElementById('topbar-search');
  const calWrap = document.getElementById('calendar-wrap');

  if (_currentView === 'calendar') {
    wrap.style.display='none'; empty.style.display='none';
    meta.style.display='none'; search.style.display='none';
    calWrap.style.display='flex';
    renderCalendar();
    return;
  }

  calWrap.style.display='none';
  const b      = activeBoard();
  const isAdm  = isAdmin();
  const hasAccess = b && (isAdm || (b.memberIds && b.memberIds.includes(currentUser.uid)));

  if (!b || !hasAccess) {
    wrap.style.display='none'; empty.style.display='flex';
    meta.style.display='none'; search.style.display='none';
    return;
  }

  wrap.style.display='flex'; empty.style.display='none';
  meta.style.display='flex'; search.style.display='';
  document.getElementById('board-title-text').textContent = b.name;

  // Só reconstrói o DOM se os dados do board realmente mudaram
  const boardHash = JSON.stringify(b);
  if (boardHash === _lastBoardHash) return;
  _lastBoardHash = boardHash;

  // avatares topbar
  const tba = document.getElementById('tb-members'); tba.innerHTML='';
  (b.memberIds||[]).slice(0,6).forEach(uid2 => {
    const u = STATE.users[uid2]; if (!u) return;
    const el = document.createElement('div');
    el.className='tb-av'; el.style.cssText=`background:${u.color}22;color:${u.color};`;
    el.setAttribute('data-tip', u.name); el.textContent=initials(u.name);
    tba.appendChild(el);
  });

  const q = _searchQ.toLowerCase();
  wrap.innerHTML = '';

  (b.columns||[]).forEach((col, ci) => {
    const cards = q
      ? col.cards.filter(k=>k.title.toLowerCase().includes(q)||(k.desc||'').toLowerCase().includes(q))
      : col.cards;

    const colEl = document.createElement('div');
    colEl.className='kanban-col'; colEl.dataset.colId=col.id;
    const accentColor = COL_ACCENT_COLORS[ci % COL_ACCENT_COLORS.length];

    // cabeçalho
    const head = document.createElement('div'); head.className='col-head';
    const colorBar = document.createElement('div'); colorBar.className='col-color-bar'; colorBar.style.background=accentColor;
    const titleInp = document.createElement('input'); titleInp.className='col-title'; titleInp.value=col.title; titleInp.readOnly=true;
    titleInp.ondblclick = ()=>{ titleInp.readOnly=false; titleInp.focus(); titleInp.select(); };
    titleInp.onblur = async ()=>{
      titleInp.readOnly=true;
      const v=titleInp.value.trim();
      if (v && v!==col.title) { col.title=v; await saveBoard(b.id); } else titleInp.value=col.title;
    };
    titleInp.onkeydown = e=>{ if(e.key==='Enter') titleInp.blur(); if(e.key==='Escape'){titleInp.value=col.title;titleInp.blur();} };
    const cnt = document.createElement('span'); cnt.className='col-count'; cnt.textContent=col.cards.length;
    const delBtn = document.createElement('button'); delBtn.className='col-delete'; delBtn.textContent='×'; delBtn.title='Excluir coluna';
    delBtn.onclick = ()=>dialog({ title:'Excluir coluna?', msg:`"${col.title}" e todos os seus cards serão removidos.`, danger:true, okLabel:'Excluir' }, async ok=>{
      if (!ok) return;
      const bd=activeBoard(); if (!bd) return;
      bd.columns=bd.columns.filter(c=>c.id!==col.id); await saveBoard(bd.id);
    });
    head.append(colorBar, titleInp, cnt, delBtn);
    colEl.appendChild(head);

    // container de cards
    const container = document.createElement('div');
    container.className='cards-container'; container.dataset.colId=col.id;
    cards.forEach(card=>container.appendChild(buildCard(card, col.id)));

    container.addEventListener('dragover',  e=>{ e.preventDefault(); container.classList.add('drag-over'); });
    container.addEventListener('dragleave', e=>{ if(!container.contains(e.relatedTarget)) container.classList.remove('drag-over'); });
    container.addEventListener('drop', async e=>{
      e.preventDefault(); container.classList.remove('drag-over');
      if (!_drag.cardId) return;
      const bd=activeBoard(); if (!bd) return;
      const fromCol=bd.columns.find(c=>c.id===_drag.colId);
      const toCol  =bd.columns.find(c=>c.id===col.id);
      if (!fromCol||!toCol) return;
      const idx=fromCol.cards.findIndex(c=>c.id===_drag.cardId); if(idx===-1) return;
      const [moved]=fromCol.cards.splice(idx,1); toCol.cards.push(moved);
      await saveBoard(bd.id);
    });
    colEl.appendChild(container);

    // formulário adicionar card
    const form=document.createElement('div'); form.className='col-add-form';
    const inp=document.createElement('textarea'); inp.className='col-add-input'; inp.placeholder='Título da tarefa...'; inp.rows=2;
    const actions=document.createElement('div'); actions.className='col-add-actions';
    const addOk=document.createElement('button'); addOk.className='btn-save'; addOk.textContent='Adicionar';
    const addNo=document.createElement('button'); addNo.className='btn-cancel'; addNo.textContent='Cancelar';
    actions.append(addOk, addNo); form.append(inp, actions);

    addOk.onclick = async ()=>{
      const t=inp.value.trim(); if(!t) return;
      const bd=activeBoard(); if(!bd) return;
      const c2=bd.columns.find(c=>c.id===col.id); if(!c2) return;
      c2.cards.push({ id:uid(), title:t, desc:'', tags:[], due:'', checklist:[], comments:[], assignees:[], done:false, createdBy:currentUser.uid, createdAt:Date.now() });
      await saveBoard(bd.id); form.classList.remove('open'); inp.value='';
    };
    addNo.onclick = ()=>{ form.classList.remove('open'); inp.value=''; };
    inp.onkeydown = e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addOk.click();} if(e.key==='Escape')addNo.click(); };
    colEl.appendChild(form);

    const addBtn=document.createElement('button'); addBtn.className='col-add-btn'; addBtn.textContent='+ Adicionar tarefa';
    addBtn.onclick=()=>{ form.classList.add('open'); inp.focus(); };
    colEl.appendChild(addBtn);

    wrap.appendChild(colEl);
  });

  // botão nova coluna
  const addCol=document.createElement('button'); addCol.id='add-col-btn'; addCol.textContent='+ Nova coluna';
  addCol.onclick=()=>dialog({ title:'Nova coluna', input:true, defaultVal:'Nova coluna', okLabel:'Criar' }, async name=>{
    if (!name) return;
    const bd=activeBoard(); if(!bd) return;
    bd.columns.push({ id:uid(), title:name, cards:[] }); await saveBoard(bd.id);
  });
  wrap.appendChild(addCol);
}

// ── Calendar ──────────────────────────────────────────
function renderCalendar() {
  const wrap = document.getElementById('calendar-wrap');
  const myTasks = [];
  Object.values(STATE.boards).forEach(b=>{
    if (!b.memberIds||!b.memberIds.includes(currentUser.uid)) return;
    (b.columns||[]).forEach(col=>{
      (col.cards||[]).forEach(card=>{
        if ((card.assignees||[]).includes(currentUser.uid)&&card.due)
          myTasks.push({ ...card, boardName:b.name, colName:col.title });
      });
    });
  });

  const firstDay      = new Date(_calYear, _calMonth, 1).getDay();
  const daysInMonth   = new Date(_calYear, _calMonth+1, 0).getDate();
  const prevMonthDays = new Date(_calYear, _calMonth, 0).getDate();
  const monthNames    = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

  let html = `
    <div class="cal-header">
      <h3>📅 Meu Calendário — ${monthNames[_calMonth]} ${_calYear}</h3>
      <div class="cal-nav">
        <button id="cal-prev">‹ Anterior</button>
        <button id="cal-today">Hoje</button>
        <button id="cal-next">Próximo ›</button>
      </div>
    </div>
    <div class="cal-grid">
      <div class="cal-day-head">Dom</div><div class="cal-day-head">Seg</div><div class="cal-day-head">Ter</div>
      <div class="cal-day-head">Qua</div><div class="cal-day-head">Qui</div><div class="cal-day-head">Sex</div><div class="cal-day-head">Sáb</div>
  `;

  const todayStr  = today();
  let dayCount    = 1;
  let nextMonthDay= 1;

  for (let i=0; i<42; i++) {
    let cellClass='cal-cell', dNum='', fullDateStr='';
    if (i<firstDay) {
      cellClass+=' other-month'; dNum=prevMonthDays-firstDay+i+1;
    } else if (dayCount<=daysInMonth) {
      dNum=dayCount;
      fullDateStr=`${_calYear}-${String(_calMonth+1).padStart(2,'0')}-${String(dNum).padStart(2,'0')}`;
      if (fullDateStr===todayStr) cellClass+=' today';
      dayCount++;
    } else {
      cellClass+=' other-month'; dNum=nextMonthDay++;
    }
    html+=`<div class="${cellClass}"><div class="cal-date">${dNum}</div>`;
    if (fullDateStr) {
      myTasks.filter(t=>t.due===fullDateStr).forEach(t=>{
        html+=`<div class="cal-task ${t.done?'done':''}" data-cal-card="${t.id}" title="${esc(t.title)} (${esc(t.boardName)})">
          <span style="color:var(--accent)">•</span> ${esc(t.title)}
        </div>`;
      });
    }
    html+=`</div>`;
  }
  html+=`</div>`;
  wrap.innerHTML=html;

  // navegação
  document.getElementById('cal-prev').onclick  = ()=>{ _calMonth--; if(_calMonth<0){_calMonth=11;_calYear--;} renderCalendar(); };
  document.getElementById('cal-next').onclick  = ()=>{ _calMonth++; if(_calMonth>11){_calMonth=0;_calYear++;} renderCalendar(); };
  document.getElementById('cal-today').onclick = ()=>{ const d=new Date(); _calMonth=d.getMonth(); _calYear=d.getFullYear(); renderCalendar(); };

  // clique nas tarefas do calendário → abre modal no quadro correto
  wrap.querySelectorAll('[data-cal-card]').forEach(el=>{
    el.onclick = ()=>{
      const cardId = el.dataset.calCard;
      // encontra qual board contém esse card e navega até ele
      for (const b of Object.values(STATE.boards)) {
        for (const col of (b.columns||[])) {
          if (col.cards.find(c=>c.id===cardId)) {
            setLocalNav(b.id, 'board');
            renderAll();
            setTimeout(()=>openModal(cardId), 100);
            return;
          }
        }
      }
    };
  });
}

let _drag = { cardId:null, colId:null };

function buildCard(card, colId) {
  const el = document.createElement('div');
  el.className='card'+(card.done?' done':'');
  el.dataset.id=card.id; el.draggable=true;

  el.addEventListener('dragstart', ()=>{ _drag.cardId=card.id; _drag.colId=colId; el.classList.add('dragging'); });
  el.addEventListener('dragend',   ()=>{ el.classList.remove('dragging'); _drag.cardId=null; _drag.colId=null; });
  el.addEventListener('click',      e=>{ if(!e.target.closest('.card-done-btn')) openModal(card.id); });

  const total=card.checklist.length, doneC=card.checklist.filter(x=>x.done).length;
  const late=card.due&&card.due<today()&&!card.done;
  const cmts=(card.comments||[]).length;

  const doneBtn=document.createElement('button'); doneBtn.className='card-done-btn'; doneBtn.title=card.done?'Reabrir':'Concluir'; doneBtn.textContent=card.done?'↺':'✓';
  doneBtn.onclick=async e=>{ e.stopPropagation(); const bd=activeBoard(); if(!bd) return; for(const c of bd.columns){const k=c.cards.find(x=>x.id===card.id); if(k){k.done=!k.done;break;}} await saveBoard(bd.id); };
  el.appendChild(doneBtn);

  const tagsHtml=(card.tags||[]).map(tid=>{ const t=TAGS.find(x=>x.id===tid); return t?`<span class="tag" style="background:${t.bg};color:${t.color}">${t.label}</span>`:''; }).join('');
  if (tagsHtml) el.insertAdjacentHTML('beforeend',`<div class="card-tags">${tagsHtml}</div>`);
  if (total>0) { const pct=Math.round(doneC/total*100); el.insertAdjacentHTML('beforeend',`<div class="card-progress-bar"><div class="card-progress-fill" style="width:${pct}%"></div></div>`); }

  el.insertAdjacentHTML('beforeend',`<div class="card-title">${esc(card.title)}</div>`);
  if (card.desc) el.insertAdjacentHTML('beforeend',`<div class="card-desc-preview">${esc(card.desc)}</div>`);

  let footHtml='';
  if (total>0)  footHtml+=`<span class="card-pill ${doneC===total?'pill-done':'pill-check'}">☑ ${doneC}/${total}</span>`;
  if (card.due) footHtml+=`<span class="card-pill ${late?'pill-late':'pill-ok'}">${late?'⚠':'📅'} ${fmtDate(card.due)}</span>`;
  if (cmts>0)   footHtml+=`<span class="card-pill pill-cmt">💬 ${cmts}</span>`;
  const assignsHtml=(card.assignees||[]).map(uid2=>{ const u=STATE.users[uid2]; return u?`<div class="card-av" style="background:${u.color}22;color:${u.color}" data-tip="${esc(u.name)}">${initials(u.name)}</div>`:''; }).join('');
  if (footHtml||assignsHtml) el.insertAdjacentHTML('beforeend',`<div class="card-footer">${footHtml}<div class="card-assignees">${assignsHtml}</div></div>`);
  return el;
}

let _modalCardId=null;

function findCard(cardId) {
  const b=activeBoard(); if(!b) return null;
  for (const c of b.columns) { const k=c.cards.find(x=>x.id===cardId); if(k) return { card:k, col:c }; }
  return null;
}

function openModal(cardId) {
  const found=findCard(cardId); if(!found) return;
  const { card, col }=found;
  _modalCardId=cardId;

  document.getElementById('modal-col-label').textContent=col.title;
  document.getElementById('modal-title').value=card.title;
  document.getElementById('modal-desc').value=card.desc||'';
  document.getElementById('modal-due').value=card.due||'';

  // etiquetas
  const te=document.getElementById('modal-tags'); te.innerHTML='';
  TAGS.forEach(t=>{
    const btn=document.createElement('button');
    btn.className='tag-toggle'+((card.tags||[]).includes(t.id)?' active':'');
    btn.textContent=t.label; btn.style.background=t.bg; btn.style.color=t.color; btn.dataset.tid=t.id;
    btn.onclick=()=>btn.classList.toggle('active');
    te.appendChild(btn);
  });

  // responsáveis
  const al=document.getElementById('modal-assignees'); al.innerHTML='';
  const currentBoard=activeBoard();
  const boardMemberIds=currentBoard?(currentBoard.memberIds||[]):[];
  if (!boardMemberIds.length) {
    al.innerHTML='<div style="font-size:11px;color:var(--text3)">Nenhum membro neste quadro.</div>';
  } else {
    boardMemberIds.forEach(uid2=>{
      const u=STATE.users[uid2]; if(!u) return;
      const row=document.createElement('div'); row.className='assignee-row';
      const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=(card.assignees||[]).includes(u.id); cb.dataset.uid=u.id;
      const sp=document.createElement('span'); sp.textContent=u.name;
      const dot=document.createElement('div'); dot.style.cssText=`width:8px;height:8px;border-radius:50%;background:${u.color};flex-shrink:0;`;
      row.append(cb,dot,sp); row.onclick=()=>{ cb.checked=!cb.checked; }; cb.onclick=e=>e.stopPropagation();
      al.appendChild(row);
    });
  }

  // info
  const creator=STATE.users[card.createdBy];
  document.getElementById('modal-info').innerHTML=`
    <div class="m-side-row"><span class="label">Criado por</span><span class="value">${esc(creator?.name||'—')}</span></div>
    <div class="m-side-row"><span class="label">Data</span><span class="value">${card.createdAt?fmtDate(new Date(card.createdAt).toISOString().split('T')[0]):'—'}</span></div>
    <div class="m-side-row"><span class="label">Status</span><span class="value" style="color:${card.done?'var(--green)':'var(--text2)'}">${card.done?'✓ Concluído':'Em aberto'}</span></div>
  `;

  renderChecklist(card);
  renderComments(card);
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-title').focus();
}

async function saveAndCloseModal() {
  const found=findCard(_modalCardId); if(!found) return;
  const card=found.card;
  const t=document.getElementById('modal-title').value.trim();
  if (t) card.title=t;
  card.desc      =document.getElementById('modal-desc').value.trim();
  card.due       =document.getElementById('modal-due').value;
  card.tags      =Array.from(document.querySelectorAll('.tag-toggle.active')).map(el=>el.dataset.tid).filter(Boolean);
  card.assignees =Array.from(document.querySelectorAll('.assignee-row input[type=checkbox]')).filter(cb=>cb.checked).map(cb=>cb.dataset.uid);
  const bd=activeBoard(); if(bd) await saveBoard(bd.id);
  document.getElementById('modal-overlay').classList.remove('open');
}

// ── Checklist ─────────────────────────────────────────
function renderChecklist(card) {
  const total=card.checklist.length, done=card.checklist.filter(x=>x.done).length;
  document.getElementById('cl-summary').textContent=`${done}/${total}`;
  const pw=document.getElementById('cl-progress-wrap');
  if (total>0) { pw.style.display='flex'; const pct=Math.round(done/total*100); document.getElementById('cl-bar-fill').style.width=pct+'%'; document.getElementById('cl-pct').textContent=pct+'%'; }
  else pw.style.display='none';

  const cl=document.getElementById('modal-checklist'); cl.innerHTML='';
  card.checklist.forEach((item,i)=>{
    const row=document.createElement('div'); row.className='cl-item';
    const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=item.done;
    cb.onchange=async()=>{ const f=findCard(_modalCardId); if(!f) return; f.card.checklist[i].done=cb.checked; renderChecklist(f.card); await saveBoard(activeBoard().id); };
    const txt=document.createElement('input'); txt.className='cl-item-text'+(item.done?' done':''); txt.value=item.text;
    txt.onblur=async()=>{ const v=txt.value.trim(); if(!v){txt.value=item.text;return;} const f=findCard(_modalCardId); if(!f) return; f.card.checklist[i].text=v; await saveBoard(activeBoard().id); };
    txt.onkeydown=e=>{ if(e.key==='Enter') txt.blur(); };
    const del=document.createElement('button'); del.className='cl-del'; del.textContent='×';
    del.onclick=async()=>{ const f=findCard(_modalCardId); if(!f) return; f.card.checklist.splice(i,1); renderChecklist(f.card); await saveBoard(activeBoard().id); };
    row.append(cb,txt,del); cl.appendChild(row);
  });
}

    const rb=row.querySelector('[data-role-uid]');
    if (rb) rb.onclick=async()=>{ await saveUser(u.id,{ role:nextRole }); toast(`${u.name} agora é ${nextRole}`,'success'); };
    const db2=row.querySelector('.user-del');
    if (db2) db2.onclick=async()=>{
      dialog({ title:'Remover usuário?', msg:`"${u.name}" perderá o acesso.`, danger:true, okLabel:'Remover' }, async ok=>{
        if (!ok) return;
        await deleteDoc(doc(db,'users',u.id)); toast('Usuário removido'); renderUserList();
      });
    };
    ul.appendChild(row);
  });
}

document.getElementById('btn-add-user').onclick=async()=>{
  const name  =document.getElementById('nu-name').value.trim();
  const email =document.getElementById('nu-email').value.trim();
  const pass  =document.getElementById('nu-pass').value;
  const role  =document.getElementById('nu-role').value;
  const err   =document.getElementById('admin-err');
  const btn   =document.getElementById('btn-add-user');
  if (!name||!email||!pass) { err.textContent='Preencha todos os campos.'; return; }
  if (pass.length<6)        { err.textContent='A senha deve ter ao menos 6 caracteres.'; return; }
  err.textContent=''; btn.disabled=true; btn.textContent='Criando...';
  try {
    const secondApp  =initializeApp(FB_CONFIG,'secondary-'+Date.now());
    const secondAuth =getAuth(secondApp);
    const cred=await createUserWithEmailAndPassword(secondAuth, email, pass);
    await updateProfile(cred.user, { displayName:name });
    const colorIdx=Object.keys(STATE.users).length%AV_COLORS.length;
    await saveUser(cred.user.uid, { name, email, role, color:AV_COLORS[colorIdx] });
    await signOut(secondAuth);
    toast(`Usuário "${name}" criado!`,'success');
    ['nu-name','nu-email','nu-pass'].forEach(id=>document.getElementById(id).value='');
    renderUserList();
  } catch(e) {
    const msgs={ 'auth/email-already-in-use':'Esse e-mail já está em uso.', 'auth/invalid-email':'E-mail inválido.', 'auth/weak-password':'Senha muito fraca.' };
    err.textContent=msgs[e.code]||'Erro: '+e.message;
  } finally { btn.disabled=false; btn.textContent='Criar usuário'; }
};
</script>
</body>
</html>
